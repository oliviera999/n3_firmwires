; PlatformIO Project Configuration File - ESP32 Aquaponie Controller (FFP5CS)
;
; CONSOLIDATION v11.59: 7 environnements → 4 essentiels
; - wroom-prod: Production ESP32-WROOM (optimisé)
; - wroom-test: Test ESP32-WROOM (debug activé)
; - s3-prod: Production ESP32-S3 (8MB)
; - s3-test: Test ESP32-S3 (debug activé)
;
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = wroom-test

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
platform_packages = 
	platformio/tool-mklittlefs @ 1.203.210628
extra_scripts = 
	pre:tools/pio_add_mklittlefs_path.py
build_unflags = -Os
build_flags = 
	-std=gnu++17
	-Iinclude
	-O1
	-ffunction-sections
	-fdata-sections
	-Wl,--gc-sections
	-fno-exceptions
	-fno-rtti
	-fno-threadsafe-statics
	-fno-use-cxa-atexit
	-DDISABLE_IMAP
	-DSILENT_MODE
	-DDISABLE_ERROR_STRING
	-DDISABLE_NTP_TIME
	-DASYNCWEBSERVER_REGEX=0
lib_deps = 
	mathieucarbou/ESPAsyncWebServer@^3.5.0
	adafruit/Adafruit Unified Sensor@^1.1.14
	adafruit/DHT sensor library@^1.4.6
	adafruit/Adafruit GFX Library@^1.11.10
	adafruit/Adafruit SSD1306@^2.5.9
	paulstoffregen/OneWire@^2.3.8
	milesburton/DallasTemperature@^3.11.0
	madhephaestus/ESP32Servo@^3.0.5
	fbiego/ESP32Time@^2.0.0
	bblanchon/ArduinoJson@^7.0.0

[env:wroom-prod]
board = esp32dev
board_build.partitions = partitions_esp32_wroom_ota_dual.csv
build_flags = 
	${env.build_flags}
	-DBOARD_WROOM
	-DPROFILE_PROD
	-DNDEBUG
	-Os
	-DCOMPILER_MEMORY_LIMIT=512
	# PSRAM_OPTIMIZER désactivé pour wroom-prod
	-DFEATURE_PSRAM_OPTIMIZER=0
	# Serveur web local désactivé
	-DDISABLE_ASYNC_WEBSERVER
	# Fonctionnalités activées
	-DFEATURE_MAIL=1
upload_speed = 921600
monitor_filters = esp32_exception_decoder
lib_deps = 
	mathieucarbou/ESPAsyncWebServer@^3.5.0
	bblanchon/ArduinoJson@^7.4.2
	madhephaestus/ESP32Servo@^3.0.9
	adafruit/DHT sensor library@^1.4.6
	adafruit/Adafruit SSD1306@^2.5.15
	mobizt/ESP Mail Client@^3.4.24
	milesburton/DallasTemperature@^4.0.5
	paulstoffregen/OneWire@^2.3.8
	adafruit/Adafruit GFX Library@^1.12.2
	adafruit/Adafruit BusIO@^1.17.4
	links2004/WebSockets@^2.7.0

[env:wroom-test]
board = esp32dev
board_build.partitions = partitions_esp32_wroom_simple.csv
check_tool = 
build_flags = 
	${env.build_flags}
	-DBOARD_WROOM
	-DPROFILE_TEST
	-DOLED_DIAGNOSTIC
	-Os
	-ffunction-sections
	-fdata-sections
	-Wl,--gc-sections
	-fno-exceptions
	-fno-rtti
	-fno-threadsafe-statics
	-fno-use-cxa-atexit
	-fno-builtin-printf
	-fno-builtin-sprintf
	-fno-builtin-vprintf
	-fno-builtin-vsprintf
	-DNDEBUG
	-DARDUINO_USB_CDC_ON_BOOT=0
	-DARDUINO_USB_MODE=1
	# Optimisations de taille Flash
	-DDISABLE_IMAP
	-DSILENT_MODE
	-DDISABLE_ERROR_STRING
	-DDISABLE_NTP_TIME
	-DASYNCWEBSERVER_REGEX=0
	-DCORE_DEBUG_LEVEL=3
	-DLOG_LEVEL=3
	# Fonctionnalités optimisées (PSRAM_OPTIMIZER désactivé pour wroom)
	-DFEATURE_MAIL=1
	-DFEATURE_ARDUINO_OTA=1
	-DFEATURE_WEBSOCKET=1
	-DFEATURE_JSON_POOL=1
	-DFEATURE_PSRAM_OPTIMIZER=0
	-DFEATURE_NETWORK_OPTIMIZER=1
	-DFEATURE_PUMP_STATS_CACHE=1
	-DFEATURE_SENSOR_CACHE=1
	-DFEATURE_REALTIME_WEBSOCKET=1
	-DFEATURE_ASSET_BUNDLER=1
	# Optimisations de compilation
	-flto
	-ffat-lto-objects
	-DCONFIG_FREERTOS_UNICORE=1
	-DCONFIG_ESP32_DEFAULT_CPU_FREQ_80=1
	-DCONFIG_ESP32_DEFAULT_CPU_FREQ_MHZ=80
upload_speed = 460800
monitor_filters = esp32_exception_decoder, time
lib_deps = 
	me-no-dev/ESPAsyncWebServer@3.6.0
	bblanchon/ArduinoJson@^7.4.2
	madhephaestus/ESP32Servo@^3.0.9
	adafruit/DHT sensor library@^1.4.6
	adafruit/Adafruit SSD1306@^2.5.15
	mobizt/ESP Mail Client@^3.4.24
	milesburton/DallasTemperature@^4.0.5
	paulstoffregen/OneWire@^2.3.8
	adafruit/Adafruit GFX Library@^1.12.2
	adafruit/Adafruit BusIO@^1.17.4
	fbiego/ESP32Time@^2.0.6
	adafruit/Adafruit Unified Sensor@^1.1.15
	links2004/WebSockets@^2.7.0

[env:s3-prod]
board = esp32-s3-devkitc-1
board_build.partitions = partitions_esp32s3_8MB_ota_xlarge.csv
build_flags = 
	${env.build_flags}
	-DBOARD_S3
	-DPROFILE_PROD
	-DNDEBUG
	-Os
upload_speed = 921600
monitor_filters = esp32_exception_decoder
lib_deps = 
	me-no-dev/ESPAsyncWebServer@3.6.0
	bblanchon/ArduinoJson@^7.4.2
	madhephaestus/ESP32Servo@^3.0.9
	adafruit/DHT sensor library@^1.4.6
	adafruit/Adafruit SSD1306@^2.5.15
	mobizt/ESP Mail Client@^3.4.24
	milesburton/DallasTemperature@^4.0.5
	paulstoffregen/OneWire@^2.3.8
	adafruit/Adafruit GFX Library@^1.12.2
	adafruit/Adafruit BusIO@^1.17.4
	links2004/WebSockets@^2.7.0

[env:s3-test]
board = esp32-s3-devkitc-1
board_build.partitions = partitions_esp32s3_8MB_ota_xlarge.csv
build_flags = 
	${env.build_flags}
	-DBOARD_S3
	-DPROFILE_TEST
	-DOLED_DIAGNOSTIC
	-DCORE_DEBUG_LEVEL=3
	-DLOG_LEVEL=3
	# Fonctionnalités test ESP32-S3 (debug activé)
	-DFEATURE_MAIL=1
	-DFEATURE_OTA=1
	-DFEATURE_WEBSOCKET=1
	-DFEATURE_PSRAM_OPTIMIZER=1
upload_speed = 460800
monitor_filters = esp32_exception_decoder, time
lib_deps = 
	me-no-dev/ESPAsyncWebServer@3.6.0
	bblanchon/ArduinoJson@^7.4.2
	madhephaestus/ESP32Servo@^3.0.9
	adafruit/DHT sensor library@^1.4.6
	adafruit/Adafruit SSD1306@^2.5.15
	mobizt/ESP Mail Client@^3.4.24
	milesburton/DallasTemperature@^4.0.5
	paulstoffregen/OneWire@^2.3.8
	adafruit/Adafruit GFX Library@^1.12.2
	adafruit/Adafruit BusIO@^1.17.4
	links2004/WebSockets@^2.7.0

