; PlatformIO Project Configuration File - ESP32 Aquaponie Controller (FFP5CS)
;
; CONSOLIDATION v11.59: 7 environnements → 4 essentiels
; - wroom-prod: Production ESP32-WROOM (optimisé)
; - wroom-test: Test ESP32-WROOM (debug activé)
; - s3-prod: Production ESP32-S3 (8MB)
; - s3-test: Test ESP32-S3 (debug activé)
;
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = wroom-test

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
monitor_raw = 0
board_build.filesystem = littlefs
platform_packages = 
	platformio/tool-mklittlefs @ 1.203.210628
extra_scripts = 
	pre:tools/pio_add_mklittlefs_path.py
build_unflags = -Os
build_flags = 
	-std=gnu++17
	-Iinclude
	-O1
	-ffunction-sections
	-fdata-sections
	-Wl,--gc-sections
	-fno-exceptions
	-fno-rtti
	-fno-threadsafe-statics
	-fno-use-cxa-atexit
	-DSILENT_MODE
	-DASYNCWEBSERVER_REGEX=0
	-DCONFIG_ESP_COREDUMP_ENABLE=0
	-DCONFIG_ESP_COREDUMP_ENABLE_TO_FLASH=0
	-DCONFIG_ESP_COREDUMP_DATA_FORMAT_ELF=0
	-DconfigCHECK_FOR_STACK_OVERFLOW=2

; =============================================================================
; FLAGS MONITEUR SÉRIE (v11.77)
; =============================================================================
; Pour activer/désactiver le moniteur série, ajouter ces flags à build_flags:
; -DENABLE_SERIAL_MONITOR=1    # Activer le moniteur série (par défaut selon profil)
; -DENABLE_SERIAL_MONITOR=0    # Désactiver complètement le moniteur série
; -DENABLE_SENSOR_LOGS=0       # Désactiver uniquement les messages de capteurs
; -DENABLE_SENSOR_LOGS=1       # Activer les messages de capteurs
; Si non défini, utilise la configuration par défaut selon le profil (PROD=OFF, TEST/DEV=ON)

; =============================================================================
; DÉPENDANCES COMMUNES - Versions verrouillées pour stabilité
; =============================================================================
lib_deps = 
	mathieucarbou/ESPAsyncWebServer@3.5.0
	adafruit/Adafruit Unified Sensor@1.1.14
	adafruit/DHT sensor library@1.4.6
	adafruit/Adafruit GFX Library@1.11.10
	adafruit/Adafruit SSD1306@2.5.9
	adafruit/Adafruit BusIO@1.17.4
	paulstoffregen/OneWire@2.3.8
	milesburton/DallasTemperature@3.11.0
	madhephaestus/ESP32Servo@3.0.5
	fbiego/ESP32Time@2.0.0
	bblanchon/ArduinoJson@7.4.2
	mobizt/ESP Mail Client@3.4.24
	links2004/WebSockets@2.7.0

lib_ignore = 
	WebServer

[env:wroom-prod]
board = esp32dev
board_build.partitions = partitions_esp32_wroom_ota_fs_medium.csv
build_flags = 
	${env.build_flags}
	-DBOARD_WROOM
	-DPROFILE_PROD
	-DNDEBUG
	-Os
	-DDISABLE_ASYNC_WEBSERVER
	-DCOMPILER_MEMORY_LIMIT=512
	# MONITEUR SÉRIE: Désactivé par défaut en PROD (SERIAL_MONITOR_ENABLED=false)
	# Pour l'activer: ajouter -DENABLE_SERIAL_MONITOR=1
	-DENABLE_SERIAL_MONITOR=0
	# Pour désactiver les logs de capteurs uniquement: ajouter -DENABLE_SENSOR_LOGS=0
	# PSRAM_OPTIMIZER désactivé pour wroom-prod
	-DFEATURE_PSRAM_OPTIMIZER=0
	# Optimisations supplémentaires pour réduire la taille
	-fno-builtin-printf
	-fno-builtin-sprintf
	-fno-builtin-vprintf
	-fno-builtin-vsprintf
	-flto
	-ffat-lto-objects
	# Couper complètement les logs core/IDF en production
	-DCORE_DEBUG_LEVEL=0
	-DLOG_LEVEL=0
	# Fonctionnalités activées
	-DFEATURE_OLED=1
	-DFEATURE_OTA=1
	-DFEATURE_MAIL=1
	-DFEATURE_ARDUINO_OTA=0
	-DFEATURE_HTTP_OTA=1
	-DFEATURE_WIFI_APSTA=1
	-DFEATURE_WEBSOCKET=1
	-DFEATURE_REALTIME_WEBSOCKET=1
	-DFEATURE_ASSET_BUNDLER=1
	-DFEATURE_NETWORK_OPTIMIZER=1
	-DFEATURE_PUMP_STATS_CACHE=1
	-DFEATURE_SENSOR_CACHE=1
	-DENABLE_SENSOR_LOGS=0
upload_speed = 921600
monitor_filters = 
lib_ignore = 
	WebServer
; Hérite des dépendances communes de [env]

[env:wroom-test]
board = esp32dev
board_build.partitions = partitions_esp32_wroom_simple.csv
check_tool = 
build_flags = 
	${env.build_flags}
	-DBOARD_WROOM
	-DPROFILE_TEST
    -DFFP_ENABLE_DANGEROUS_ENDPOINTS
	# Pour désactiver le serveur web pour un test, décommenter la ligne -DDISABLE_ASYNC_WEBSERVER
	;-DDISABLE_ASYNC_WEBSERVER
	-DOLED_DIAGNOSTIC
	-Os
	-fno-builtin-printf
	-fno-builtin-sprintf
	-fno-builtin-vprintf
	-fno-builtin-vsprintf
	-DNDEBUG
	-DARDUINO_USB_CDC_ON_BOOT=0
	-DARDUINO_USB_MODE=1
	-DCORE_DEBUG_LEVEL=5
	-DLOG_LEVEL=5
	# Fonctionnalités optimisées (PSRAM_OPTIMIZER désactivé pour wroom)
	-DFEATURE_OLED=1
	-DFEATURE_OTA=1
	-DFEATURE_MAIL=1
	-DFEATURE_ARDUINO_OTA=1
	-DFEATURE_HTTP_OTA=1
	-DFEATURE_WIFI_APSTA=1
	-DFEATURE_WEBSOCKET=1
	-DFEATURE_PSRAM_OPTIMIZER=0
	-DFEATURE_NETWORK_OPTIMIZER=1
	-DFEATURE_PUMP_STATS_CACHE=1
	-DFEATURE_SENSOR_CACHE=1
	-DFEATURE_REALTIME_WEBSOCKET=1
	-DFEATURE_ASSET_BUNDLER=1
	# Monitoring verbeux activé pour wroom-test
	-DENABLE_SENSOR_LOGS=1
	-DENABLE_SERIAL_MONITOR=1
	# Désactiver SILENT_MODE pour logs verbeux
	-USILENT_MODE
	# Optimisations de compilation
	-flto
	-ffat-lto-objects
	-DCONFIG_ESP32_DEFAULT_CPU_FREQ_80=1
	-DCONFIG_ESP32_DEFAULT_CPU_FREQ_MHZ=80
upload_speed = 115200
# Filtres de monitor pour verbosité maximale (time + colorize pour lisibilité)
monitor_filters = time, colorize
# Si le serveur web est désactivé via le build_flag ci-dessus, décommenter aussi les lignes suivantes
; lib_ignore = 
;  WebServer
;  ESPAsyncWebServer
; Hérite des dépendances communes de [env]

[env:s3-prod]
board = esp32-s3-devkitc-1
board_build.partitions = partitions_esp32s3_8MB_ota_xlarge.csv
build_flags = 
	${env.build_flags}
	-DBOARD_S3
	-DPROFILE_PROD
	-DNDEBUG
	-Os
	# Fonctionnalités activées
	-DFEATURE_OLED=1
	-DFEATURE_OTA=1
	-DFEATURE_MAIL=1
	-DFEATURE_ARDUINO_OTA=0
	-DFEATURE_HTTP_OTA=1
	-DFEATURE_WIFI_APSTA=1
	-DFEATURE_WEBSOCKET=1
	-DFEATURE_REALTIME_WEBSOCKET=1
	-DFEATURE_ASSET_BUNDLER=1
	-DFEATURE_NETWORK_OPTIMIZER=1
	-DFEATURE_PUMP_STATS_CACHE=1
	-DFEATURE_SENSOR_CACHE=1
	-DFEATURE_PSRAM_OPTIMIZER=1
upload_speed = 921600
monitor_filters = 
; Hérite des dépendances communes de [env]

[env:s3-test]
board = esp32-s3-devkitc-1
board_build.partitions = partitions_esp32s3_8MB_ota_xlarge.csv
build_flags = 
	${env.build_flags}
	-DBOARD_S3
	-DPROFILE_TEST
    -DFFP_ENABLE_DANGEROUS_ENDPOINTS
	-DOLED_DIAGNOSTIC
	-DCORE_DEBUG_LEVEL=3
	-DLOG_LEVEL=3
	# Fonctionnalités test ESP32-S3 (debug activé)
	-DFEATURE_OLED=1
	-DFEATURE_OTA=1
	-DFEATURE_MAIL=1
	-DFEATURE_ARDUINO_OTA=1
	-DFEATURE_HTTP_OTA=1
	-DFEATURE_WIFI_APSTA=1
	-DFEATURE_WEBSOCKET=1
	-DFEATURE_REALTIME_WEBSOCKET=1
	-DFEATURE_ASSET_BUNDLER=1
	-DFEATURE_NETWORK_OPTIMIZER=1
	-DFEATURE_PUMP_STATS_CACHE=1
	-DFEATURE_SENSOR_CACHE=1
	-DFEATURE_PSRAM_OPTIMIZER=1
upload_speed = 460800
monitor_filters = time
; Hérite des dépendances communes de [env]

