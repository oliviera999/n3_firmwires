; PlatformIO Project Configuration File - ESP32 Aquaponie Controller (FFP5CS)
;
; v11.146: Simplification - Suppression des feature flags non utilisés
; - wroom-prod: Production ESP32-WROOM (optimisé)
; - wroom-test: Test ESP32-WROOM (debug activé)
;
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = wroom-test

; =============================================================================
; CONFIGURATION COMMUNE
; =============================================================================
[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
monitor_raw = 0
board_build.filesystem = littlefs
build_src_filter =
	+<*>
	-<timer_manager.cpp>
platform_packages = 
	platformio/tool-mklittlefs @ 1.203.210628
extra_scripts = 
	pre:tools/pio_add_mklittlefs_path.py
build_unflags = -Os
build_flags = 
	-std=gnu++17
	-Iinclude
	-O1
	-ffunction-sections
	-fdata-sections
	-Wl,--gc-sections
	-fno-exceptions
	-fno-rtti
	-fno-threadsafe-statics
	-fno-use-cxa-atexit
	-DSILENT_MODE
	-DASYNCWEBSERVER_REGEX=0
	-DconfigCHECK_FOR_STACK_OVERFLOW=2
	; Features activées
	-DFEATURE_OLED=1
	-DFEATURE_MAIL=1
	-DFEATURE_OTA=1
	-DFEATURE_ARDUINO_OTA=1
	-DFEATURE_WIFI_APSTA=0

; =============================================================================
; DÉPENDANCES COMMUNES - Versions verrouillées pour stabilité
; =============================================================================
lib_deps = 
	mathieucarbou/ESPAsyncWebServer@3.5.0
	adafruit/Adafruit Unified Sensor@1.1.14
	adafruit/DHT sensor library@1.4.6
	adafruit/Adafruit GFX Library@1.11.10
	adafruit/Adafruit SSD1306@2.5.9
	adafruit/Adafruit BusIO@1.17.4
	paulstoffregen/OneWire@2.3.8
	milesburton/DallasTemperature@3.11.0
	madhephaestus/ESP32Servo@3.0.5
	fbiego/ESP32Time@2.0.0
	bblanchon/ArduinoJson@7.4.2
	; v11.149: Version conservée (pas de version plus récente disponible)
	; Le bug NULL pointer dans strcat est contourné par les protections heap/mutex
	mobizt/ESP Mail Client@3.4.24
	links2004/WebSockets@2.7.0

lib_ignore = 
	WebServer

; =============================================================================
; ENVIRONNEMENT PRODUCTION WROOM
; =============================================================================
[env:wroom-prod]
board = esp32dev
board_build.partitions = partitions_esp32_wroom_ota_coredump.csv
build_flags = 
	${env.build_flags}
	-DBOARD_WROOM
	-DPROFILE_PROD
	-DNDEBUG
	-Os
	; Moniteur série désactivé en production
	-DENABLE_SERIAL_MONITOR=0
	-DENABLE_SENSOR_LOGS=0
	; Optimisations pour réduire la taille
	-fno-builtin-printf
	-fno-builtin-sprintf
	-fno-builtin-vprintf
	-fno-builtin-vsprintf
	-flto
	-ffat-lto-objects
	; Logs ESP-IDF désactivés
	-DCORE_DEBUG_LEVEL=0
	-DLOG_LEVEL=0
	; Core dump activé
	-DCONFIG_ESP_COREDUMP_ENABLE=1
	-DCONFIG_ESP_COREDUMP_ENABLE_TO_FLASH=1
	-DCONFIG_ESP_COREDUMP_DATA_FORMAT_ELF=1
	-DCONFIG_ESP_COREDUMP_CHECKSUM_SHA256=1
upload_speed = 921600

; =============================================================================
; ENVIRONNEMENT TEST WROOM
; =============================================================================
[env:wroom-test]
board = esp32dev
board_build.partitions = partitions_esp32_wroom_test_coredump.csv
build_flags = 
	${env.build_flags}
	-DBOARD_WROOM
	-DPROFILE_TEST
	-DFFP_ENABLE_DANGEROUS_ENDPOINTS
	-DOLED_DIAGNOSTIC
	-Os
	-fno-builtin-printf
	-fno-builtin-sprintf
	-fno-builtin-vprintf
	-fno-builtin-vsprintf
	-DNDEBUG
	-DARDUINO_USB_CDC_ON_BOOT=0
	-DARDUINO_USB_MODE=1
	; Logs verbeux
	-DCORE_DEBUG_LEVEL=5
	-DLOG_LEVEL=5
	-DENABLE_SENSOR_LOGS=1
	-DENABLE_SERIAL_MONITOR=1
	-USILENT_MODE
	; Core dump activé
	-DCONFIG_ESP_COREDUMP_ENABLE=1
	-DCONFIG_ESP_COREDUMP_ENABLE_TO_FLASH=1
	-DCONFIG_ESP_COREDUMP_DATA_FORMAT_ELF=1
	-DCONFIG_ESP_COREDUMP_CHECKSUM_SHA256=1
	; Optimisations
	-flto
	-ffat-lto-objects
upload_speed = 115200
monitor_filters = time, colorize

; =============================================================================
; ENVIRONNEMENT TESTS UNITAIRES (Native)
; =============================================================================
[env:native]
platform = native
framework = 
test_framework = unity
test_build_src = yes
test_filter =
	test_rate_limiter
	test_timer_manager
build_src_filter =
	-<*>
	+<timer_manager.cpp>
	+<rate_limiter.cpp>
lib_deps = 
	unity = unity@>=2.5.2
build_flags = 
	-std=gnu++17
	-Itest/unit
	-Iinclude
	-Og
	-g
	-DUNIT_TEST
	-DARDUINO=0
	-DESP32=0
	-DDISABLE_ASYNC_WEBSERVER
	-Dmock_millis
	-Dmock_micros
	-DFREERTOS=0
	-DESP_IDF_VERSION_MAJOR=0
