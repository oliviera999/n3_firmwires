; PlatformIO Project Configuration File - ESP32 Aquaponie Controller (FFP5CS)
; Projet : c:/ffp5cs (chemin court, adapté au build S3 sous Windows / limite ligne de commande).
;
; v11.146: Simplification - Suppression des feature flags non utilisés
; - wroom-prod: Production ESP32-WROOM (optimisé)
; - wroom-test: Test ESP32-WROOM (debug activé)
; - wroom-s3-test: Test ESP32-S3 (DevKitC-1, debug activé)
; - wroom-s3-prod: Production ESP32-S3 (optimisé, routes S3 prod)
; - wroom-beta: Prod build + endpoints/canal OTA test (USE_TEST_ENDPOINTS)
;
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = wroom-test

; =============================================================================
; CONFIGURATION COMMUNE
; Plateforme officielle platformio/espressif32 (tous les env). S3 N16R8 : board 4d R8N16 avec PSRAM.
; =============================================================================
[env]
platform = platformio/espressif32
framework = arduino
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
monitor_raw = 0
board_build.filesystem = littlefs
build_src_filter =
	+<*>
	-<tls_minimal_test.cpp>
platform_packages = 
	platformio/tool-mklittlefs @ 1.203.210628
extra_scripts = 
	pre:tools/pio_pre_apply_arduino_patches.py
	pre:tools/pio_add_mklittlefs_path.py
	pre:tools/s3_idf_git_data_fix.py
	pre:tools/s3_patch_esp_insights_mqtt.py
	pre:tools/s3_patch_wpa_supplicant_wno_error.py
	pre:tools/s3_patch_ldgen_fragments_file.py
	pre:tools/s3_patch_platform_espidf_ldgen.py
build_unflags = -Os
build_flags = 
	-std=gnu++17
	-Iinclude
	-O1
	-ffunction-sections
	-fdata-sections
	-Wl,--gc-sections
	-fno-exceptions
	-fno-rtti
	-fno-threadsafe-statics
	-fno-use-cxa-atexit
	-DSILENT_MODE
	-DASYNCWEBSERVER_REGEX=0
	-DconfigCHECK_FOR_STACK_OVERFLOW=2
	; Features activées
	-DFEATURE_OLED=1
	-DFEATURE_MAIL=1
	-DFEATURE_OTA=1
	-DFEATURE_ARDUINO_OTA=1
	-DFEATURE_HTTP_OTA=1
	-DFEATURE_WIFI_APSTA=0
	; Modem-sleep WiFi désactivé dans tous les profils (stabilité liaison)
	-DWIFI_MODEM_SLEEP_ENABLED=0

; =============================================================================
; DÉPENDANCES COMMUNES - Versions verrouillées pour stabilité
; v11.191: ESP32Async (AsyncTCP + ESPAsyncWebServer) pour corriger crash tcp_recved listen-pcb
; =============================================================================
lib_deps = 
	ESP32Async/AsyncTCP
	ESP32Async/ESPAsyncWebServer
	adafruit/Adafruit Unified Sensor@1.1.14
	adafruit/DHT sensor library@1.4.6
	adafruit/Adafruit GFX Library@1.11.10
	adafruit/Adafruit SSD1306@2.5.9
	adafruit/Adafruit BusIO@1.17.4
	paulstoffregen/OneWire@2.3.8
	milesburton/DallasTemperature@3.11.0
	madhephaestus/ESP32Servo@3.0.5
	fbiego/ESP32Time@2.0.0
	bblanchon/ArduinoJson@7.4.2
	; v11.149: Version conservée (pas de version plus récente disponible)
	; Le bug NULL pointer dans strcat est contourné par les protections heap/mutex
	mobizt/ESP Mail Client@3.4.24
	links2004/WebSockets@2.7.0

lib_ignore = 
	WebServer

; =============================================================================
; ENVIRONNEMENT PRODUCTION WROOM
; =============================================================================
[env:wroom-prod]
board = esp32dev
; Partition sans coredump (config d’avant v11.129) — littlefs 0x0B0000, OTA dual
board_build.partitions = config/partitions/partitions_esp32_wroom_ota_fs_medium.csv
lib_ignore = WebServer, ESPAsyncWebServer, WebSockets
build_flags = 
	${env.build_flags}
	-std=gnu++17
	-DBOARD_WROOM
	-DESP_IDF_VERSION_MAJOR=5
	-DPROFILE_PROD
	; DHT: seul wroom-prod utilise un DHT22 ; tous les autres envs (wroom-test, wroom-beta, wroom-s3-*) utilisent DHT11
	-DUSE_DHT22
	-DDISABLE_ASYNC_WEBSERVER
	-DNDEBUG
	-Os
	; Moniteur série désactivé en production
	-DENABLE_SERIAL_MONITOR=0
	-DENABLE_SENSOR_LOGS=0
	; Optimisations pour réduire la taille
	-fno-builtin-printf
	-fno-builtin-sprintf
	-fno-builtin-vprintf
	-fno-builtin-vsprintf
	-flto
	-ffat-lto-objects
	; Logs ESP-IDF désactivés
	-DCORE_DEBUG_LEVEL=0
	-DLOG_LEVEL=0
	; Core dump désactivé (économie flash, pas de partition coredump)
	-DFFP5CS_COREDUMP_ENABLE=0
	; v11.157: Stack loopTask augmentée pour éviter stack overflow (même problème que wroom-test)
	-DCONFIG_ARDUINO_LOOP_STACK_SIZE=24576
upload_speed = 921600

; =============================================================================
; ENVIRONNEMENT TEST WROOM
; =============================================================================
[env:wroom-test]
board = esp32dev
board_build.partitions = config/partitions/partitions_esp32_wroom_test_coredump.csv
; Timeout Task WDT 30 s (évite reset pendant HTTP/async_tcp bloquant)
custom_sdkconfig = file://sdkconfig_wroom_wdt.txt
build_flags = 
	${env.build_flags}
	-std=gnu++17
	-DBOARD_WROOM
	-DPROFILE_TEST
	-DFFP_ENABLE_DANGEROUS_ENDPOINTS
	-DOLED_DIAGNOSTIC
	; TEST Point 1: augmenter la stack de loopTask (stack canary triggered)
	; v11.157: Augmenté à 24576 bytes pour éviter stack overflow lors de l'envoi de mail
	-DCONFIG_ARDUINO_LOOP_STACK_SIZE=24576
	-Os
	-fno-builtin-printf
	-fno-builtin-sprintf
	-fno-builtin-vprintf
	-fno-builtin-vsprintf
	-DNDEBUG
	-DARDUINO_USB_CDC_ON_BOOT=0
	-DARDUINO_USB_MODE=1
	; Logs ESP-IDF niveau ERROR (évite spam I2C/hal, réduit risque blocage Serial)
	-DCORE_DEBUG_LEVEL=1
	-DLOG_LEVEL=5
	-DENABLE_SENSOR_LOGS=1
	-DENABLE_SERIAL_MONITOR=1
	-USILENT_MODE
	; Core dump désactivé (économie flash, pas de partition coredump)
	-DFFP5CS_COREDUMP_ENABLE=0
	; Optimisations
	-flto
	-ffat-lto-objects
upload_speed = 115200
; Sans colorize pour logs exploitables par scripts (diagnostic, analyse) sans codes ANSI
monitor_filters = time

; =============================================================================
; ENVIRONNEMENTS WROOM-S3 (base commune + test / prod)
; Board 4d R8N16 = 16 MB flash, 8 MB PSRAM OPI (qio_opi inclus), équivalent N16R8.
; =============================================================================
[env:wroom-s3-base]
board = 4d_systems_esp32s3_gen4_r8n16
board_build.partitions = config/partitions/partitions_esp32_s3_test.csv
board_build.filesystem = littlefs
; TG1WDT boot loop: désactiver IWDT via fichier (évite # interprété en commentaire INI)
custom_sdkconfig =
  file://sdkconfig_s3_wdt.txt
build_flags =
	${env.build_flags}
	-std=gnu++17
	-DBOARD_S3
	-DBOARD_HAS_PSRAM
	; Éviter psramAddToHeap() dans initArduino (blocage boot S3) — force skip du bloc #ifndef CONFIG_SPIRAM_BOOT_INIT
	-DCONFIG_SPIRAM_BOOT_INIT=1
	; Stack loopTask 32 KB (DIAGNOSTIC_BACKTRACE_S3: évite stack canary loopTask)
	-DCONFIG_ARDUINO_LOOP_STACK_SIZE=32768
	-Os
	-fno-builtin-printf
	-fno-builtin-sprintf
	-fno-builtin-vprintf
	-fno-builtin-vsprintf
	-DNDEBUG
	-DARDUINO_USB_CDC_ON_BOOT=0
	-DARDUINO_USB_MODE=1
	-DFFP5CS_COREDUMP_ENABLE=0
	-flto
	-ffat-lto-objects
upload_speed = 921600
monitor_speed = 115200

[env:wroom-s3-test]
extends = env:wroom-s3-base
; Plateforme pioarduino pour call_compile_libs (fix TG1WDT boot loop)
; platformio/espressif32 6.x n'a pas cette logique, pioarduino/platform-espressif32 oui
platform = https://github.com/pioarduino/platform-espressif32.git
; Packages requis par call_compile_libs (espidf.py) : tool-cmake, tool-ninja, framework-espidf, tool-esp-rom-elfs
; framework-espidf pioarduino compatible avec toolchain pioarduino (20251107), platformio attend 20241119
platform_packages =
	platformio/tool-cmake
	platformio/tool-ninja
	framework-espidf@https://github.com/pioarduino/esp-idf/releases/download/v5.5.2.260116/esp-idf-v5.5.2.tar.xz
	platformio/tool-esp-rom-elfs
; Hériter custom_sdkconfig pour que le builder (HandleArduinoIDFsettings) le voie pour cet env
custom_sdkconfig =
  file://sdkconfig_s3_wdt.txt
; ESP Mail Client : forcer LittleFS via include/Custom_ESP_Mail_FS.h + pre script (CPPPATH/CPPFLAGS LittleFS).
; LittleFS : ignorer la lib framework (symboles non exportés au link S3), on utilise BuildSources dans pio_add_mklittlefs_path.py.
; CONFIG_LITTLEFS_PAGE_SIZE requis pour que LittleFS.cpp du framework compile l'implémentation (sinon #ifdef vide).
lib_ignore = LittleFS
build_flags =
	${env:wroom-s3-base.build_flags}
	-DCONFIG_LITTLEFS_PAGE_SIZE=256
	-DPROFILE_TEST
	-DUSE_TEST3_ENDPOINTS
	-DFFP_ENABLE_DANGEROUS_ENDPOINTS
	-DOLED_DIAGNOSTIC
	-DCORE_DEBUG_LEVEL=1
	-DLOG_LEVEL=5
	-DENABLE_SENSOR_LOGS=1
	-DENABLE_SERIAL_MONITOR=1
	-USILENT_MODE
monitor_filters = time

; Comparaison TG0WDT : plateforme officielle (sans call_compile_libs). Tester si le boot loop
; TG0WDT est spécifique à pioarduino ou aussi présent avec platformio/espressif32.
[env:wroom-s3-test-official]
extends = env:wroom-s3-base
platform = platformio/espressif32
custom_sdkconfig =
  file://sdkconfig_s3_wdt.txt
lib_ignore = LittleFS
build_flags =
	${env:wroom-s3-base.build_flags}
	-DCONFIG_LITTLEFS_PAGE_SIZE=256
	-DPROFILE_TEST
	-DUSE_TEST3_ENDPOINTS
	-DFFP_ENABLE_DANGEROUS_ENDPOINTS
	-DOLED_DIAGNOSTIC
	-DCORE_DEBUG_LEVEL=1
	-DLOG_LEVEL=5
	-DENABLE_SENSOR_LOGS=1
	-DENABLE_SERIAL_MONITOR=1
	-USILENT_MODE
monitor_filters = time

; S3 avec USB Serial/JTAG natif : flash + monitor + debug JTAG via un seul câble USB.
; Carte avec connecteur USB câblé sur GPIO19/20 (ex. ESP32-S3-DevKitC-1, ou 4D GEN4 si USB présent).
; Voir docs/technical/ESP32S3_USB_JTAG_DEBUG.md pour l'utilisation.
[env:wroom-s3-test-usb]
extends = env:wroom-s3-test
upload_protocol = esp-builtin
debug_tool = esp-builtin
build_flags =
	${env:wroom-s3-test.build_flags}
	-DARDUINO_USB_CDC_ON_BOOT=1
monitor_filters = time

; S3 prod : même plateforme que S3 test pour call_compile_libs (fix TG1WDT boot loop). Flags PROD uniquement.
[env:wroom-s3-prod]
extends = env:wroom-s3-base
platform = https://github.com/pioarduino/platform-espressif32.git
platform_packages =
	platformio/tool-cmake
	platformio/tool-ninja
	framework-espidf@https://github.com/pioarduino/esp-idf/releases/download/v5.5.2.260116/esp-idf-v5.5.2.tar.xz
	platformio/tool-esp-rom-elfs
custom_sdkconfig =
  file://sdkconfig_s3_wdt.txt
lib_ignore = WebServer, ESPAsyncWebServer, WebSockets, LittleFS
build_flags =
	${env:wroom-s3-base.build_flags}
	-DCONFIG_LITTLEFS_PAGE_SIZE=256
	-DPROFILE_PROD
	-DDISABLE_ASYNC_WEBSERVER
	-DENABLE_SERIAL_MONITOR=0
	-DENABLE_SENSOR_LOGS=0
	-DCORE_DEBUG_LEVEL=0
	-DLOG_LEVEL=0

; BME280: capteur air alternatif au DHT pour S3 (I2C)
; lib_deps sans DHT (remplacé par BME280)
[env:wroom-s3-test-bme280]
extends = env:wroom-s3-test
build_flags =
	${env:wroom-s3-test.build_flags}
	-DUSE_AIR_SENSOR_BME280
lib_ignore = WebServer
lib_deps =
	ESP32Async/AsyncTCP
	ESP32Async/ESPAsyncWebServer
	adafruit/Adafruit Unified Sensor@1.1.14
	adafruit/Adafruit GFX Library@1.11.10
	adafruit/Adafruit SSD1306@2.5.9
	adafruit/Adafruit BusIO@1.17.4
	adafruit/Adafruit BME280 Library
	paulstoffregen/OneWire@2.3.8
	milesburton/DallasTemperature@3.11.0
	madhephaestus/ESP32Servo@3.0.5
	fbiego/ESP32Time@2.0.0
	bblanchon/ArduinoJson@7.4.2
	mobizt/ESP Mail Client@3.4.24
	links2004/WebSockets@2.7.0

[env:wroom-s3-prod-bme280]
extends = env:wroom-s3-prod
build_flags =
	${env:wroom-s3-prod.build_flags}
	-DUSE_AIR_SENSOR_BME280
lib_ignore = WebServer, ESPAsyncWebServer, WebSockets
lib_deps =
	ESP32Async/AsyncTCP
	adafruit/Adafruit Unified Sensor@1.1.14
	adafruit/Adafruit GFX Library@1.11.10
	adafruit/Adafruit SSD1306@2.5.9
	adafruit/Adafruit BusIO@1.17.4
	adafruit/Adafruit BME280 Library
	paulstoffregen/OneWire@2.3.8
	milesburton/DallasTemperature@3.11.0
	madhephaestus/ESP32Servo@3.0.5
	fbiego/ESP32Time@2.0.0
	bblanchon/ArduinoJson@7.4.2
	mobizt/ESP Mail Client@3.4.24

; =============================================================================
; ENVIRONNEMENT BETA WROOM (prod build + endpoints test)
; =============================================================================
[env:wroom-beta]
extends = env:wroom-prod
; Hérite lib_ignore de wroom-prod (ESPAsyncWebServer, WebSockets)
; DHT11 (pas DHT22) : annuler USE_DHT22 hérité de wroom-prod
build_flags =
	${env:wroom-prod.build_flags}
	-UUSE_DHT22
	-DUSE_TEST_ENDPOINTS

; =============================================================================
; ENVIRONNEMENT TEST TLS MINIMAL
; =============================================================================
[env:wroom-tls-test]
board = esp32dev
board_build.partitions = config/partitions/partitions_esp32_wroom_test_coredump.csv
build_flags =
	${env.build_flags}
	-DBOARD_WROOM
	-DPROFILE_TEST
	-DENABLE_SERIAL_MONITOR=1
	-DCORE_DEBUG_LEVEL=5
	-DLOG_LEVEL=5
	-DFFP5CS_COREDUMP_ENABLE=0
build_src_filter =
	-<*>
	+<tls_minimal_test.cpp>
upload_speed = 115200
monitor_filters = time

; =============================================================================
; ENVIRONNEMENT TESTS UNITAIRES NATIFS (Unity)
; Exécution : pio test -e native   ou   .\scripts\test_unit_all.ps1
; test_filter : uniquement nos tests (test_rate_limiter nécessite rate_limiter.h absent).
; =============================================================================
[env:native]
platform = native
test_framework = unity
test_filter = test_nvs, test_config
build_flags =
	-DUNIT_TEST
	-I$PROJECT_DIR/test/unit
	-I$PROJECT_DIR/test/test_config
	-I$PROJECT_DIR/test/test_nvs