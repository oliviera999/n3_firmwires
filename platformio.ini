; PlatformIO Project Configuration File for ESP32-S3
[platformio]
default_envs = esp32s3

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
monitor_filters = direct, esp32_exception_decoder
upload_speed = 921600
build_flags = 
    -D CORE_DEBUG_LEVEL=3
    -D CONFIG_ASYNC_TCP_RUNNING_CORE=1
    -D CONFIG_ASYNC_TCP_USE_WDT=1
    -Wall
    -Wextra
lib_deps = 
    bblanchon/ArduinoJson@^7.2.0
    esphome/AsyncTCP-esphome@^2.1.4
    esphome/ESPAsyncWebServer-esphome@^3.2.2
    adafruit/Adafruit Unified Sensor@^1.1.14
    adafruit/DHT sensor library@^1.4.6
    bodmer/TFT_eSPI@^2.5.43
    knolleary/PubSubClient@^2.8
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^3.11.0

[env:esp32s3]
board = esp32-s3-devkitc-1
board_build.partitions = partitions_esp32s3_8MB_ota_large.csv
board_build.flash_size = 8MB
board_build.psram = enabled
board_build.arduino.memory_type = qio_opi
build_flags = 
    ${env.build_flags}
    -D BOARD_HAS_PSRAM
    -D CONFIG_SPIRAM_SUPPORT=1
    -D CONFIG_SPIRAM_USE_MALLOC=1
    -mfix-esp32-psram-cache-issue
lib_ldf_mode = deep+

[env:esp32_wroom]
board = esp32dev
board_build.partitions = partitions_esp32_wroom_ota.csv
board_build.flash_size = 4MB
build_flags = 
    ${env.build_flags}
    -D ESP32_WROOM
lib_ldf_mode = deep+