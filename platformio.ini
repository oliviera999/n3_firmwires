; PlatformIO Project Configuration File - ESP32 Aquaponie Controller (FFP5CS)
;
; v11.146: Simplification - Suppression des feature flags non utilisés
; - wroom-prod: Production ESP32-WROOM (optimisé)
; - wroom-test: Test ESP32-WROOM (debug activé)
; - wroom-beta: Prod build + endpoints/canal OTA test (USE_TEST_ENDPOINTS)
;
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = wroom-test

; =============================================================================
; CONFIGURATION COMMUNE
; =============================================================================
[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
monitor_raw = 0
board_build.filesystem = littlefs
build_src_filter =
	+<*>
	-<tls_minimal_test.cpp>
platform_packages = 
	platformio/tool-mklittlefs @ 1.203.210628
extra_scripts = 
	pre:tools/pio_add_mklittlefs_path.py
build_unflags = -Os
build_flags = 
	-std=gnu++17
	-Iinclude
	-O1
	-ffunction-sections
	-fdata-sections
	-Wl,--gc-sections
	-fno-exceptions
	-fno-rtti
	-fno-threadsafe-statics
	-fno-use-cxa-atexit
	-DSILENT_MODE
	-DASYNCWEBSERVER_REGEX=0
	-DconfigCHECK_FOR_STACK_OVERFLOW=2
	; Features activées
	-DFEATURE_OLED=1
	-DFEATURE_MAIL=1
	-DFEATURE_OTA=1
	-DFEATURE_ARDUINO_OTA=1
	-DFEATURE_HTTP_OTA=1
	-DFEATURE_WIFI_APSTA=0

; =============================================================================
; DÉPENDANCES COMMUNES - Versions verrouillées pour stabilité
; v11.191: ESP32Async (AsyncTCP + ESPAsyncWebServer) pour corriger crash tcp_recved listen-pcb
; =============================================================================
lib_deps = 
	ESP32Async/AsyncTCP
	ESP32Async/ESPAsyncWebServer
	adafruit/Adafruit Unified Sensor@1.1.14
	adafruit/DHT sensor library@1.4.6
	adafruit/Adafruit GFX Library@1.11.10
	adafruit/Adafruit SSD1306@2.5.9
	adafruit/Adafruit BusIO@1.17.4
	paulstoffregen/OneWire@2.3.8
	milesburton/DallasTemperature@3.11.0
	madhephaestus/ESP32Servo@3.0.5
	fbiego/ESP32Time@2.0.0
	bblanchon/ArduinoJson@7.4.2
	; v11.149: Version conservée (pas de version plus récente disponible)
	; Le bug NULL pointer dans strcat est contourné par les protections heap/mutex
	mobizt/ESP Mail Client@3.4.24
	links2004/WebSockets@2.7.0

lib_ignore = 
	WebServer

; =============================================================================
; ENVIRONNEMENT PRODUCTION WROOM
; =============================================================================
[env:wroom-prod]
board = esp32dev
; Partition sans coredump (config d’avant v11.129) — littlefs 0x0B0000, OTA dual
board_build.partitions = config/partitions/partitions_esp32_wroom_ota_fs_medium.csv
lib_ignore = WebServer, ESPAsyncWebServer, WebSockets
build_flags = 
	${env.build_flags}
	-DBOARD_WROOM
	-DPROFILE_PROD
	-DDISABLE_ASYNC_WEBSERVER
	-DNDEBUG
	-Os
	; Moniteur série désactivé en production
	-DENABLE_SERIAL_MONITOR=0
	-DENABLE_SENSOR_LOGS=0
	; Optimisations pour réduire la taille
	-fno-builtin-printf
	-fno-builtin-sprintf
	-fno-builtin-vprintf
	-fno-builtin-vsprintf
	-flto
	-ffat-lto-objects
	; Logs ESP-IDF désactivés
	-DCORE_DEBUG_LEVEL=0
	-DLOG_LEVEL=0
	; Core dump désactivé (économie flash, pas de partition coredump)
	-DFFP5CS_COREDUMP_ENABLE=0
	; v11.157: Stack loopTask augmentée pour éviter stack overflow (même problème que wroom-test)
	-DCONFIG_ARDUINO_LOOP_STACK_SIZE=24576
upload_speed = 921600

; =============================================================================
; ENVIRONNEMENT TEST WROOM
; =============================================================================
[env:wroom-test]
board = esp32dev
board_build.partitions = partitions_esp32_wroom_test_coredump.csv
build_flags = 
	${env.build_flags}
	-DBOARD_WROOM
	-DPROFILE_TEST
	-DFFP_ENABLE_DANGEROUS_ENDPOINTS
	-DOLED_DIAGNOSTIC
	; TEST Point 1: augmenter la stack de loopTask (stack canary triggered)
	; v11.157: Augmenté à 24576 bytes pour éviter stack overflow lors de l'envoi de mail
	-DCONFIG_ARDUINO_LOOP_STACK_SIZE=24576
	-Os
	-fno-builtin-printf
	-fno-builtin-sprintf
	-fno-builtin-vprintf
	-fno-builtin-vsprintf
	-DNDEBUG
	-DARDUINO_USB_CDC_ON_BOOT=0
	-DARDUINO_USB_MODE=1
	; Logs verbeux
	-DCORE_DEBUG_LEVEL=5
	-DLOG_LEVEL=5
	-DENABLE_SENSOR_LOGS=1
	-DENABLE_SERIAL_MONITOR=1
	-USILENT_MODE
	; Core dump désactivé (économie flash, pas de partition coredump)
	-DFFP5CS_COREDUMP_ENABLE=0
	; Optimisations
	-flto
	-ffat-lto-objects
upload_speed = 115200
monitor_filters = time, colorize

; =============================================================================
; ENVIRONNEMENT BETA WROOM (prod build + endpoints test)
; =============================================================================
[env:wroom-beta]
extends = env:wroom-prod
; Hérite lib_ignore de wroom-prod (ESPAsyncWebServer, WebSockets)
build_flags =
	${env:wroom-prod.build_flags}
	-DUSE_TEST_ENDPOINTS

; =============================================================================
; ENVIRONNEMENT TEST TLS MINIMAL
; =============================================================================
[env:wroom-tls-test]
board = esp32dev
board_build.partitions = partitions_esp32_wroom_test_coredump.csv
build_flags =
	${env.build_flags}
	-DBOARD_WROOM
	-DPROFILE_TEST
	-DENABLE_SERIAL_MONITOR=1
	-DCORE_DEBUG_LEVEL=5
	-DLOG_LEVEL=5
	-DFFP5CS_COREDUMP_ENABLE=0
build_src_filter =
	-<*>
	+<tls_minimal_test.cpp>
upload_speed = 115200
monitor_filters = time, colorize

