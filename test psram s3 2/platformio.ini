; Projet minimal ESP32-S3-WROOM-1-N16R8 — Boot + PSRAM OPI + stabilité
; Module : 16 Mo flash, 8 Mo PSRAM Octal. Port : COM7.

[platformio]
default_envs = s3-n16r8-psram

[env:s3-n16r8-psram]
platform = platformio/espressif32
framework = arduino
board = esp32-s3-devkitc-1
board_upload.flash_size = 16MB
board_upload.flash_mode = qio
board_build.arduino.memory_type = qio_opi
upload_port = COM7
monitor_speed = 115200

; Table de partitions minimal (nvs + app)
board_build.partitions = config/partitions/partitions_s3_minimal.csv

; sdkconfig : PSRAM OPI, IWDT désactivé au boot, TWDT non init au boot
custom_sdkconfig = file://sdkconfig_s3_psram.txt

; Patch IWDT 300 ms -> 300000 ms (variant qio_opi) pour éviter TG1WDT au boot
extra_scripts = pre:tools/pio_s3_psram_patch_iwdt.py

build_flags =
	-DARDUINO_USB_CDC_ON_BOOT=0
	-DARDUINO_USB_MODE=1

upload_speed = 921600
