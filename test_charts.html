<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Test Charts</title>
<script>
// Test du code des graphiques
console.log('Début du test...');

// Simuler la fonction d'initialisation
function testInitCharts() {
  console.log('Test initialisation...');
  
  // Options communes pour les graphiques
  const commonOpts = {
    width: 800,
    height: 200,
    cursor: { drag: { x: false, y: false } },
    legend: { show: true },
    scales: { 
      x: { 
        time: false // Désactiver le mode temporel automatique
      } 
    },
    axes: [
      { 
        stroke: '#94a3b8', 
        grid: { stroke: 'rgba(255,255,255,0.1)', width: 1 }, 
        ticks: { stroke: 'rgba(255,255,255,0.1)', width: 1 },
        values: (u, vals, space) => vals.map(v => {
          const d = new Date(v);
          const h = String(d.getHours()).padStart(2, '0');
          const m = String(d.getMinutes()).padStart(2, '0');
          const s = String(d.getSeconds()).padStart(2, '0');
          return `${h}:${m}:${s}`;
        })
      },
      { stroke: '#94a3b8', grid: { stroke: 'rgba(255,255,255,0.1)', width: 1 }, ticks: { stroke: 'rgba(255,255,255,0.1)', width: 1 } }
    ]
  };
  
  console.log('commonOpts créé:', commonOpts);
  
  // Test avec Object.assign
  const tempOpts = Object.assign({}, commonOpts, {
    series: [
      {},
      { label: 'Air °C', stroke: '#f59e0b', width: 2, fill: 'rgba(245, 158, 11, 0.1)' },
      { label: 'Eau °C', stroke: '#06b6d4', width: 2, fill: 'rgba(6, 182, 212, 0.1)' }
    ]
  });
  
  console.log('tempOpts créé:', tempOpts);
  console.log('✅ Test réussi - pas d\'erreur JavaScript');
}

try {
  testInitCharts();
} catch (e) {
  console.error('❌ Erreur:', e);
}
</script>
</head>
<body>
<h1>Test des graphiques - Ouvrez la console (F12)</h1>
<p>Vérifiez la console pour les résultats du test.</p>
</body>
</html>
