<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Debug Variables BDD</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .warning { background-color: #fff3cd; border-color: #ffeaa7; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Test Debug Variables BDD</h1>
    
    <div class="test-section">
        <h2>Test de l'endpoint /dbvars</h2>
        <button onclick="testDbVars()">Tester /dbvars</button>
        <div id="dbvarsResult"></div>
    </div>
    
    <div class="test-section">
        <h2>Test de l'endpoint /json</h2>
        <button onclick="testJson()">Tester /json</button>
        <div id="jsonResult"></div>
    </div>
    
    <div class="test-section">
        <h2>Informations de connexion</h2>
        <div id="connectionInfo"></div>
    </div>

    <script>
        // Afficher les informations de connexion
        document.getElementById('connectionInfo').innerHTML = `
            <p><strong>URL actuelle:</strong> ${window.location.href}</p>
            <p><strong>Host:</strong> ${window.location.host}</p>
            <p><strong>Protocole:</strong> ${window.location.protocol}</p>
        `;

        async function testDbVars() {
            const resultDiv = document.getElementById('dbvarsResult');
            resultDiv.innerHTML = '<p>Test en cours...</p>';
            
            try {
                console.log('[TEST] Test de /dbvars');
                const response = await fetch('/dbvars', { cache: 'no-store' });
                console.log('[TEST] Réponse:', response.status, response.statusText);
                
                const responseText = await response.text();
                console.log('[TEST] Contenu brut:', responseText);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = JSON.parse(responseText);
                console.log('[TEST] JSON parsé:', data);
                
                resultDiv.innerHTML = `
                    <div class="success">
                        <h3>✅ Succès</h3>
                        <p><strong>Status HTTP:</strong> ${response.status}</p>
                        <p><strong>Données valides:</strong> ${data.ok ? 'Oui' : 'Non'}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                console.error('[TEST] Erreur:', error);
                resultDiv.innerHTML = `
                    <div class="error">
                        <h3>❌ Erreur</h3>
                        <p><strong>Type:</strong> ${error.name}</p>
                        <p><strong>Message:</strong> ${error.message}</p>
                        <pre>${error.stack}</pre>
                    </div>
                `;
            }
        }

        async function testJson() {
            const resultDiv = document.getElementById('jsonResult');
            resultDiv.innerHTML = '<p>Test en cours...</p>';
            
            try {
                console.log('[TEST] Test de /json');
                const response = await fetch('/json', { cache: 'no-store' });
                console.log('[TEST] Réponse:', response.status, response.statusText);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('[TEST] JSON parsé:', data);
                
                resultDiv.innerHTML = `
                    <div class="success">
                        <h3>✅ Succès</h3>
                        <p><strong>Status HTTP:</strong> ${response.status}</p>
                        <p><strong>Données disponibles:</strong> ${Object.keys(data).length} champs</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                console.error('[TEST] Erreur:', error);
                resultDiv.innerHTML = `
                    <div class="error">
                        <h3>❌ Erreur</h3>
                        <p><strong>Type:</strong> ${error.name}</p>
                        <p><strong>Message:</strong> ${error.message}</p>
                        <pre>${error.stack}</pre>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
