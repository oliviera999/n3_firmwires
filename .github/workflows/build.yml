name: PlatformIO CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        environment: [wroom-prod, wroom-dev]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: false  # Désactivé car les sous-modules semblent optionnels
        fetch-depth: 0
    
    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Cache PlatformIO
      uses: actions/cache@v4
      with:
        path: ~/.platformio
        key: ${{ runner.os }}-platformio-${{ hashFiles('**/platformio.ini') }}
        restore-keys: |
          ${{ runner.os }}-platformio-
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade platformio
    
    - name: Display PlatformIO version
      run: pio --version
    
    - name: List available environments
      run: pio project config --json-output
      continue-on-error: true
    
    - name: Build PlatformIO project
      run: pio run --environment ${{ matrix.environment }}
    
    - name: Display memory usage
      run: |
        pio run --environment ${{ matrix.environment }} --target size
    
    - name: Archive firmware
      uses: actions/upload-artifact@v4
      with:
        name: firmware-${{ matrix.environment }}
        path: |
          .pio/build/${{ matrix.environment }}/firmware.bin
          .pio/build/${{ matrix.environment }}/firmware.elf
        retention-days: 30
    
    - name: Archive filesystem
      uses: actions/upload-artifact@v4
      if: matrix.environment == 'wroom-prod'
      with:
        name: littlefs-${{ matrix.environment }}
        path: |
          .pio/build/${{ matrix.environment }}/littlefs.bin
        retention-days: 30
      continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: false
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade platformio
    
    - name: Run static analysis
      run: pio check --environment wroom-prod --skip-packages
      continue-on-error: true

  summary:
    runs-on: ubuntu-latest
    needs: [build, lint]
    if: always()
    
    steps:
    - name: Build Summary
      run: |
        echo "## Build Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Build Status: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
        echo "Lint Status: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY

