; Tests unitaires hôte (Unity) — isolé du [env] Arduino du platformio.ini principal.
; Usage : pio test -c platformio-native.ini -e native
[platformio]
default_envs = native

[env:native]
platform = native
test_framework = unity
test_filter = test_nvs, test_config
lib_deps = throwtheswitch/Unity@^2.6.1
build_flags =
	-std=gnu++17
	-DUNIT_TEST
	-Iinclude
	-Itest/unit
	-Itest/test_config
	-Itest/test_nvs
