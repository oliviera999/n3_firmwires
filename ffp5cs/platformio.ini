; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = wroom-test

[env]
platform = platformio/espressif32@6.13.0
framework = arduino
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
monitor_raw = 0
board_build.filesystem = littlefs
board_build.cpp_standard = cpp17
build_src_filter = 
	+<*>
	-<tls_minimal_test.cpp>
platform_packages = 
	platformio/tool-mklittlefs @ 1.203.210628
extra_scripts = 
	pre:../scripts/pio_redirect_build_dir.py
	pre:tools/pio_ensure_secrets.py
	pre:tools/pio_add_mklittlefs_path.py
	pre:tools/pio_ensure_git_data.py
	pre:tools/s3_patch_esp_insights_mqtt.py
	pre:tools/s3_patch_wpa_supplicant_wno_error.py
	post:tools/pio_write_build_version.py
build_unflags = 
	-Os
	-std=gnu++11
build_flags = 
	-std=gnu++17
	-Iinclude
	-O1
	-ffunction-sections
	-fdata-sections
	-Wl,--gc-sections
	-fno-exceptions
	-fno-rtti
	-fno-threadsafe-statics
	-fno-use-cxa-atexit
	-Wno-deprecated-declarations
	-DSILENT_MODE
	-DASYNCWEBSERVER_REGEX=0
	-DconfigCHECK_FOR_STACK_OVERFLOW=2
	-DFEATURE_OLED=1
	-DFEATURE_MAIL=1
	-DFEATURE_OTA=1
	-DFEATURE_HTTP_OTA=1
	-DFEATURE_WIFI_APSTA=0
	-DWIFI_MODEM_SLEEP_ENABLED=0
lib_extra_dirs = ../shared
lib_deps = 
	ESP32Async/AsyncTCP
	ESP32Async/ESPAsyncWebServer
	adafruit/Adafruit Unified Sensor@1.1.14
	adafruit/DHT sensor library@1.4.6
	adafruit/Adafruit GFX Library@1.11.10
	adafruit/Adafruit SSD1306@2.5.9
	adafruit/Adafruit BusIO@1.17.4
	paulstoffregen/OneWire@2.3.8
	milesburton/DallasTemperature@3.11.0
	madhephaestus/ESP32Servo@3.0.5
	fbiego/ESP32Time@2.0.0
	bblanchon/ArduinoJson@7.4.2
	mobizt/ESP Mail Client@3.4.24
	links2004/WebSockets@2.7.0
lib_ignore = 
	WebServer

[env:wroom-prod]
board = esp32dev
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
platform_packages = 
	platformio/tool-mklittlefs @ 1.203.210628
	framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32/releases/download/3.3.7/esp32-core-3.3.7.tar.xz
board_build.partitions = config/partitions/partitions_esp32_wroom_ota_fs_mail.csv
custom_sdkconfig = file://sdkconfig_wroom_wdt.txt
lib_ignore = WebServer, ESPAsyncWebServer, WebSockets, LittleFS
build_flags = 
	${env.build_flags}
	-DCONFIG_ESP_TASK_WDT_TIMEOUT_S=30
	-Wno-error
	-std=gnu++17
	-DBOARD_WROOM
	-DPROFILE_PROD
	-DUSE_DHT22
	-DDISABLE_ASYNC_WEBSERVER
	-DNDEBUG
	-Os
	-DENABLE_SERIAL_MONITOR=0
	-DENABLE_SENSOR_LOGS=0
	-fno-builtin-printf
	-fno-builtin-sprintf
	-fno-builtin-vprintf
	-fno-builtin-vsprintf
	-DCORE_DEBUG_LEVEL=0
	-DLOG_LEVEL=0
	-DFFP5CS_COREDUMP_ENABLE=0
upload_speed = 921600

[env:wroom-test]
board = esp32dev
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
platform_packages = 
	platformio/tool-mklittlefs @ 1.203.210628
board_build.partitions = config/partitions/partitions_esp32_wroom_test.csv
custom_sdkconfig = file://sdkconfig_wroom_wdt.txt
lib_ignore = LittleFS
build_flags = 
	${env.build_flags}
	-DCONFIG_ESP_TASK_WDT_TIMEOUT_S=30
	-Wno-error
	-std=gnu++17
	-DBOARD_WROOM
	-DPROFILE_TEST
	-DFFP_ENABLE_DANGEROUS_ENDPOINTS
	-DOLED_DIAGNOSTIC
	-Os
	-fno-builtin-printf
	-fno-builtin-sprintf
	-fno-builtin-vprintf
	-fno-builtin-vsprintf
	-DNDEBUG
	-DARDUINO_USB_CDC_ON_BOOT=0
	-DARDUINO_USB_MODE=1
	-DCORE_DEBUG_LEVEL=1
	-DLOG_LEVEL=5
	-DENABLE_SENSOR_LOGS=1
	-DENABLE_SERIAL_MONITOR=1
	-USILENT_MODE
	-DFFP5CS_COREDUMP_ENABLE=0
	-flto
	-ffat-lto-objects
upload_speed = 115200
monitor_filters = time

[env:wroom-s3-base]
board = esp32-s3-devkitc-1
board_upload.flash_size = 16MB
board_build.partitions = config/partitions/partitions_esp32_s3_test.csv
board_build.filesystem = littlefs
extra_scripts = ${env.extra_scripts}
custom_sdkconfig = 
	file://sdkconfig_s3_wdt.txt
build_flags = 
	${env.build_flags}
	-std=gnu++17
	-DBOARD_S3
	-DUSE_RTC_DS3231
	-DCONFIG_ESP_TASK_WDT_TIMEOUT_S=300
	-DARDUINO_LOOP_STACK_SIZE=32768
	-DCONFIG_ARDUINO_LOOP_STACK_SIZE=32768
	-Os
	-fno-builtin-printf
	-fno-builtin-sprintf
	-fno-builtin-vprintf
	-fno-builtin-vsprintf
	-DNDEBUG
	-DARDUINO_USB_CDC_ON_BOOT=0
	-DARDUINO_USB_MODE=1
	-DFFP5CS_COREDUMP_ENABLE=0
	-flto
	-ffat-lto-objects
upload_speed = 921600
monitor_speed = 115200
lib_deps = 
	${env.lib_deps}
	adafruit/Adafruit BME280 Library

[env:wroom-s3-test]
extends = env:wroom-s3-base
board_build.partitions = config/partitions/partitions_esp32_s3_test.csv
lib_ignore = LittleFS
build_flags = 
	${env:wroom-s3-base.build_flags}
	-DCONFIG_LITTLEFS_PAGE_SIZE=256
	-DPROFILE_TEST
	-DUSE_TEST3_ENDPOINTS
	-DFFP_ENABLE_DANGEROUS_ENDPOINTS
	-DOLED_DIAGNOSTIC
	-DCORE_DEBUG_LEVEL=1
	-DLOG_LEVEL=5
	-DENABLE_SENSOR_LOGS=1
	-DENABLE_SERIAL_MONITOR=1
	-USILENT_MODE
	-DUSE_AIR_SENSOR_AUTO
	-DFFP5CS_COREDUMP_ENABLE=0
monitor_filters = time

[env:wroom-s3-test-psram]
extends = env:wroom-s3-base
extra_scripts = 
	pre:../scripts/pio_redirect_build_dir.py
	pre:tools/pio_ensure_secrets.py
	pre:tools/pio_add_mklittlefs_path.py
	pre:tools/pio_ensure_lib_dirs_windows.py
	pre:tools/pio_ensure_git_data.py
	pre:tools/s3_patch_esp_insights_mqtt.py
	pre:tools/s3_patch_wpa_supplicant_wno_error.py
	pre:tools/pio_pre_apply_arduino_patches.py
	pre:tools/pio_s3_psram_patch_iwdt.py
	post:tools/pio_write_build_version.py
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_build.flash_mode = qio
board_build.extra_flags = -DBOARD_HAS_PSRAM
board_build.partitions = config/partitions/partitions_esp32_s3_test.csv
board_build.sdkconfig_options = 
	CONFIG_ESPTOOLPY_FLASHMODE_QIO=y
	CONFIG_SPIRAM=y
custom_sdkconfig = file://sdkconfig_s3_wdt_16mb_psram.txt
lib_ignore = LittleFS
build_flags = 
	${env:wroom-s3-base.build_flags}
	-DBOARD_HAS_PSRAM
	-mfix-esp32-psram-cache-issue
	-DCONFIG_LITTLEFS_PAGE_SIZE=256
	-DPROFILE_TEST
	-DUSE_TEST3_ENDPOINTS
	-DFFP_ENABLE_DANGEROUS_ENDPOINTS
	-DOLED_DIAGNOSTIC
	-DCORE_DEBUG_LEVEL=1
	-DLOG_LEVEL=5
	-DENABLE_SENSOR_LOGS=1
	-DENABLE_SERIAL_MONITOR=1
	-USILENT_MODE
	-DARDUINO_USB_CDC_ON_BOOT=0
monitor_filters = time

[env:wroom-s3-test-psram-v2]
extends = env:wroom-s3-base
extra_scripts = ${env.extra_scripts}
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_build.flash_mode = qio
board_build.extra_flags = -DBOARD_HAS_PSRAM
board_build.partitions = config/partitions/partitions_esp32_s3_test.csv
board_build.sdkconfig_options = 
	CONFIG_ESPTOOLPY_FLASHMODE_QIO=y
	CONFIG_SPIRAM=y
custom_sdkconfig = file://sdkconfig_s3_wdt_16mb_psram.txt
lib_ignore = LittleFS
build_flags = 
	${env:wroom-s3-base.build_flags}
	-DBOARD_HAS_PSRAM
	-DCONFIG_LITTLEFS_PAGE_SIZE=256
	-DPROFILE_TEST
	-DUSE_TEST3_ENDPOINTS
	-DFFP_ENABLE_DANGEROUS_ENDPOINTS
	-DOLED_DIAGNOSTIC
	-DCORE_DEBUG_LEVEL=1
	-DLOG_LEVEL=5
	-DENABLE_SENSOR_LOGS=1
	-DENABLE_SERIAL_MONITOR=1
	-USILENT_MODE
monitor_filters = time

[env:wroom-s3-test-devkit]
extends = env:wroom-s3-base
platform = platformio/espressif32@6.13.0
board = esp32-s3-devkitc-1
board_upload.flash_size = 8MB
board_build.arduino.memory_type = qio_opi
board_build.partitions = config/partitions/partitions_esp32_s3_8mb.csv
custom_sdkconfig = file://sdkconfig_s3_wdt_8mb.txt
lib_ignore = LittleFS
build_flags = 
	${env:wroom-s3-base.build_flags}
	-DCONFIG_LITTLEFS_PAGE_SIZE=256
	-DPROFILE_TEST
	-DUSE_TEST3_ENDPOINTS
	-DFFP_ENABLE_DANGEROUS_ENDPOINTS
	-DOLED_DIAGNOSTIC
	-DCORE_DEBUG_LEVEL=1
	-DLOG_LEVEL=5
	-DENABLE_SENSOR_LOGS=1
	-DENABLE_SERIAL_MONITOR=1
	-USILENT_MODE
monitor_filters = time

[env:wroom-s3-test-usb]
extends = env:wroom-s3-test
upload_protocol = esp-builtin
debug_tool = esp-builtin
build_flags = 
	${env:wroom-s3-test.build_flags}
	-DARDUINO_USB_CDC_ON_BOOT=1
monitor_filters = time

[env:wroom-s3-prod]
extends = env:wroom-s3-base
lib_ignore = WebServer, ESPAsyncWebServer, WebSockets, LittleFS
build_flags = 
	${env:wroom-s3-base.build_flags}
	-DCONFIG_LITTLEFS_PAGE_SIZE=256
	-DPROFILE_PROD
	-DDISABLE_ASYNC_WEBSERVER
	-DENABLE_SERIAL_MONITOR=0
	-DENABLE_SENSOR_LOGS=0
	-DCORE_DEBUG_LEVEL=0
	-DLOG_LEVEL=0
	-DUSE_AIR_SENSOR_AUTO

[env:wroom-beta]
extends = env:wroom-prod
build_flags = 
	${env:wroom-prod.build_flags}
	-UPROFILE_PROD
	-DPROFILE_BETA
	-UUSE_DHT22
	-DUSE_TEST_ENDPOINTS
	-UENABLE_SERIAL_MONITOR
	-DENABLE_SERIAL_MONITOR=1
	-UCORE_DEBUG_LEVEL
	-DCORE_DEBUG_LEVEL=1
monitor_filters = time

[env:wroom-beta-local]
extends = env:wroom-beta
build_flags = 
	${env:wroom-beta.build_flags}
	-DUSE_LOCAL_SERVER_ENDPOINTS

[env:wroom-tls-test]
board = esp32dev
board_build.partitions = config/partitions/partitions_esp32_wroom_test.csv
build_flags = 
	${env.build_flags}
	-DBOARD_WROOM
	-DPROFILE_TEST
	-DENABLE_SERIAL_MONITOR=1
	-DCORE_DEBUG_LEVEL=5
	-DLOG_LEVEL=5
	-DFFP5CS_COREDUMP_ENABLE=0
build_src_filter = 
	-<*>
	+<tls_minimal_test.cpp>
upload_speed = 115200
monitor_filters = time
