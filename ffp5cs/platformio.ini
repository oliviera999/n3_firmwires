; PlatformIO Project Configuration File - ESP32 Aquaponie Controller (FFP5CS)
; Projet : sous Windows le build est redirigé par défaut vers C:/pio-builds/ffp5cs/<env>/ (script pre ../scripts/pio_redirect_build_dir.py).
; Désactiver : variable N3_PIO_BUILD_REDIRECT=0 ; racine personnalisée : N3_PIO_BUILD_ROOT.
;
; Matériel S3 de référence : ESP32-S3 (QFN56) révision v0.2, 16 Mo flash, 8 Mo PSRAM (N16R8).
; v11.146: Simplification - Suppression des feature flags non utilisés
; - wroom-prod: Production ESP32-WROOM (optimisé)
; - wroom-test: Test ESP32-WROOM (debug activé)
; - wroom-s3-test: Test ESP32-S3 (DevKitC-1 / N16R8, debug activé)
; - wroom-s3-prod: Production ESP32-S3 (optimisé, routes S3 prod)
; - wroom-s3-test-psram: S3 N16R8 avec PSRAM activée (BOARD_HAS_PSRAM)
; - wroom-beta: Reflet prod, mode test (OTA, partition test) — entêtes "beta", pas de serveur embarqué
;
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = wroom-test
 
; =============================================================================
; CONFIGURATION COMMUNE
; Plateforme officielle platformio/espressif32 (tous les env). S3 : board esp32-s3-devkitc-1, 16 MB flash ; env PSRAM pour N16R8 : wroom-s3-test-psram.
; =============================================================================
[env]
platform = platformio/espressif32@6.13.0
framework = arduino
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
monitor_raw = 0
board_build.filesystem = littlefs
; Forcer C++17 pour inline constexpr, etc. (évite centaines de warnings au build)
board_build.cpp_standard = cpp17
build_src_filter =
	+<*>
	-<tls_minimal_test.cpp>
platform_packages = 
	platformio/tool-mklittlefs @ 1.203.210628
; Scripts communs WROOM + S3. Patches core S3 (earlyInitVariant, diag_nvs, libs_s3_wdt) désactivés pour tous les env.
; post: pio_write_build_version.py écrit la version (config.h) dans BUILD_DIR/version.txt pour publish_ota.ps1.
extra_scripts =
	pre:../scripts/pio_redirect_build_dir.py
	pre:tools/pio_ensure_secrets.py
	pre:tools/pio_add_mklittlefs_path.py
	pre:tools/pio_ensure_git_data.py
	pre:tools/s3_patch_esp_insights_mqtt.py
	pre:tools/s3_patch_wpa_supplicant_wno_error.py
	post:tools/pio_write_build_version.py
; Retirer -std=gnu++11 (défaut Arduino-ESP32) pour que -std=gnu++17 soit bien appliqué (inline constexpr, etc.)
build_unflags = 
	-Os
	-std=gnu++11
build_flags = 
	-std=gnu++17
	-Iinclude
	-O1
	-ffunction-sections
	-fdata-sections
	-Wl,--gc-sections
	-fno-exceptions
	-fno-rtti
	-fno-threadsafe-statics
	-fno-use-cxa-atexit
	-Wno-deprecated-declarations
	-DSILENT_MODE
	-DASYNCWEBSERVER_REGEX=0
	-DconfigCHECK_FOR_STACK_OVERFLOW=2
	; Features activées
	-DFEATURE_OLED=1
	-DFEATURE_MAIL=1
	-DFEATURE_OTA=1
	-DFEATURE_HTTP_OTA=1
	-DFEATURE_WIFI_APSTA=0
	; Modem-sleep WiFi désactivé dans tous les profils (stabilité liaison)
	-DWIFI_MODEM_SLEEP_ENABLED=0

; Bibliothèque commune ADC (luminosité, pont diviseur, humidité sol)
lib_extra_dirs = ../shared

; =============================================================================
; DÉPENDANCES COMMUNES - Versions verrouillées pour stabilité
; v11.191: ESP32Async (AsyncTCP + ESPAsyncWebServer) pour corriger crash tcp_recved listen-pcb
; =============================================================================
lib_deps = 
	ESP32Async/AsyncTCP
	ESP32Async/ESPAsyncWebServer
	adafruit/Adafruit Unified Sensor@1.1.14
	adafruit/DHT sensor library@1.4.6
	adafruit/Adafruit GFX Library@1.11.10
	adafruit/Adafruit SSD1306@2.5.9
	adafruit/Adafruit BusIO@1.17.4
	paulstoffregen/OneWire@2.3.8
	milesburton/DallasTemperature@3.11.0
	madhephaestus/ESP32Servo@3.0.5
	fbiego/ESP32Time@2.0.0
	bblanchon/ArduinoJson@7.4.2
	; v11.149: Version conservée (pas de version plus récente disponible)
	; Le bug NULL pointer dans strcat est contourné par les protections heap/mutex
	mobizt/ESP Mail Client@3.4.24
	links2004/WebSockets@2.7.0

lib_ignore = 
	WebServer

; =============================================================================
; ENVIRONNEMENT PRODUCTION WROOM
; Plateforme pioarduino = Arduino-ESP32 3.3.7 (IDF 5.5.2). S3 reste sur platformio/espressif32 (voir wroom-s3-base).
; =============================================================================
[env:wroom-prod]
board = esp32dev
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
platform_packages =
	platformio/tool-mklittlefs @ 1.203.210628
; Partition sans coredump (config d’avant v11.129) — littlefs 0x0B0000, OTA dual
board_build.partitions = config/partitions/partitions_esp32_wroom_ota_fs_mail.csv
; Timeout Task WDT 30 s (aligné wroom-test, évite reset pendant HTTP/async_tcp)
custom_sdkconfig = file://sdkconfig_wroom_wdt.txt
lib_ignore = WebServer, ESPAsyncWebServer, WebSockets, LittleFS
; ESP Mail Client : Custom_ESP_Mail_FS.h → SPIFFS pour WROOM (LittleFS pour S3). LittleFS ignoré pour économiser RAM.
; -Wno-error : wpa_supplicant (.c) reçoit des options C++ avec -Werror (pioarduino)
; CONFIG_ESP_TASK_WDT_TIMEOUT_S : nécessaire pour AsyncTCP (sdkconfig pas toujours visible en compile libs Arduino)
build_flags = 
	${env.build_flags}
	-DCONFIG_ESP_TASK_WDT_TIMEOUT_S=30
	-Wno-error
	-std=gnu++17
	-DBOARD_WROOM
	; ESP_IDF_VERSION_MAJOR défini par le SDK (4) — pas de -D pour éviter warning redefinition
	-DPROFILE_PROD
	; DHT: seul wroom-prod utilise un DHT22 ; tous les autres envs (wroom-test, wroom-beta, wroom-s3-*) utilisent DHT11
	-DUSE_DHT22
	-DDISABLE_ASYNC_WEBSERVER
	-DNDEBUG
	-Os
	; Moniteur série désactivé en production
	-DENABLE_SERIAL_MONITOR=0
	-DENABLE_SENSOR_LOGS=0
	; Optimisations pour réduire la taille
	-fno-builtin-printf
	-fno-builtin-sprintf
	-fno-builtin-vprintf
	-fno-builtin-vsprintf
	-flto
	-ffat-lto-objects
	; Logs ESP-IDF désactivés
	-DCORE_DEBUG_LEVEL=0
	-DLOG_LEVEL=0
	; Core dump désactivé (économie flash, pas de partition coredump)
	-DFFP5CS_COREDUMP_ENABLE=0
upload_speed = 921600

; =============================================================================
; ENVIRONNEMENT TEST WROOM
; Si erreur "WiFi.cpp.o: No such file or directory" à l'archive : nettoyage complet
; puis rebuild (Supprimer .pio\build ; pio run -e wroom-test -t clean ; pio run -e wroom-test).
; Si FRAMEWORK_DIR None ou "argument should be str... NoneType" : lancer d'abord pio run -e wroom-prod puis pio run -e wroom-test.
; Plateforme pioarduino = Arduino-ESP32 3.3.7 (IDF 5.5.2).
; =============================================================================
[env:wroom-test]
board = esp32dev
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
platform_packages =
	platformio/tool-mklittlefs @ 1.203.210628
board_build.partitions = config/partitions/partitions_esp32_wroom_test.csv
; Timeout Task WDT 30 s (évite reset pendant HTTP/async_tcp bloquant)
custom_sdkconfig = file://sdkconfig_wroom_wdt.txt
lib_ignore = LittleFS
; ESP Mail Client : Custom_ESP_Mail_FS.h → SPIFFS pour WROOM. LittleFS ignoré pour économiser RAM.
; -Wno-error : wpa_supplicant (.c) reçoit des options C++ avec -Werror (pioarduino)
; CONFIG_ESP_TASK_WDT_TIMEOUT_S : nécessaire pour AsyncTCP (sdkconfig pas toujours visible en compile libs Arduino)
build_flags = 
	${env.build_flags}
	-DCONFIG_ESP_TASK_WDT_TIMEOUT_S=30
	-Wno-error
	-std=gnu++17
	-DBOARD_WROOM
	-DPROFILE_TEST
	-DFFP_ENABLE_DANGEROUS_ENDPOINTS
	-DOLED_DIAGNOSTIC
	-Os
	-fno-builtin-printf
	-fno-builtin-sprintf
	-fno-builtin-vprintf
	-fno-builtin-vsprintf
	-DNDEBUG
	-DARDUINO_USB_CDC_ON_BOOT=0
	-DARDUINO_USB_MODE=1
	; Logs ESP-IDF niveau ERROR (évite spam I2C/hal, réduit risque blocage Serial)
	-DCORE_DEBUG_LEVEL=1
	-DLOG_LEVEL=5
	-DENABLE_SENSOR_LOGS=1
	-DENABLE_SERIAL_MONITOR=1
	-USILENT_MODE
	; Core dump désactivé (économie flash, pas de partition coredump)
	-DFFP5CS_COREDUMP_ENABLE=0
	; Optimisations
	-flto
	-ffat-lto-objects
upload_speed = 115200
; Sans colorize pour logs exploitables par scripts (diagnostic, analyse) sans codes ANSI
monitor_filters = time

; =============================================================================
; ENVIRONNEMENTS WROOM-S3 (base commune + test / prod)
; Board ESP32-S3-DevKitC-1, matériel de référence N16R8 (16 Mo flash, 8 Mo PSRAM). Build par défaut : 16 Mo flash, PSRAM désactivée (boot stable).
; S3 reste sur platformio/espressif32 (IDF 4.4.7). Alignement pioarduino bloqué : phase Arduino sans sdkconfig.h + erreur linker « gap » possible.
; =============================================================================
[env:wroom-s3-base]
board = esp32-s3-devkitc-1
board_upload.flash_size = 16MB
board_build.partitions = config/partitions/partitions_esp32_s3_test.csv
board_build.filesystem = littlefs
extra_scripts = ${env.extra_scripts}
; sdkconfig S3 (WDT, pas de PSRAM)
custom_sdkconfig =
  file://sdkconfig_s3_wdt.txt
build_flags =
	${env.build_flags}
	-std=gnu++17
	-DBOARD_S3
	-DUSE_RTC_DS3231
	; PSRAM non utilisée (BOARD_HAS_PSRAM non défini) — boot stable, réactiver si besoin
	; CONFIG_ESP_TASK_WDT_TIMEOUT_S : nécessaire pour AsyncTCP quand TWDT_INIT=n (sdkconfig)
	-DCONFIG_ESP_TASK_WDT_TIMEOUT_S=300
	; Stack loopTask 32 KB (évite stack canary loopTask). ARDUINO_LOOP_STACK_SIZE pris en premier par main.cpp, évite override 8192 de sdkconfig.h
	-DARDUINO_LOOP_STACK_SIZE=32768
	-DCONFIG_ARDUINO_LOOP_STACK_SIZE=32768
	-Os
	-fno-builtin-printf
	-fno-builtin-sprintf
	-fno-builtin-vprintf
	-fno-builtin-vsprintf
	-DNDEBUG
	-DARDUINO_USB_CDC_ON_BOOT=0
	-DARDUINO_USB_MODE=1
	-DFFP5CS_COREDUMP_ENABLE=0
	-flto
	-ffat-lto-objects
upload_speed = 921600
monitor_speed = 115200
; Détection air au boot : BME280 puis DHT (USE_AIR_SENSOR_AUTO dans test/prod)
lib_deps =
	${env.lib_deps}
	adafruit/Adafruit BME280 Library

[env:wroom-s3-test]
extends = env:wroom-s3-base
; upload_port : ne pas coder en dur (conventions-firmwares) ; utiliser -e ... --upload-port COMx ou variable d'env
; Partition sans coredump (désactivé partout — évite boot bloquant, simplicité)
board_build.partitions = config/partitions/partitions_esp32_s3_test.csv
; Plateforme héritée de [env] (platformio/espressif32@6.13.0).
; ESP Mail Client : forcer LittleFS via include/Custom_ESP_Mail_FS.h + pre script (CPPPATH/CPPFLAGS LittleFS).
; LittleFS : ignorer la lib framework (symboles non exportés au link S3), on utilise BuildSources dans pio_add_mklittlefs_path.py.
; CONFIG_LITTLEFS_PAGE_SIZE requis pour que LittleFS.cpp du framework compile l'implémentation (sinon #ifdef vide).
lib_ignore = LittleFS
build_flags =
	${env:wroom-s3-base.build_flags}
	-DCONFIG_LITTLEFS_PAGE_SIZE=256
	-DPROFILE_TEST
	-DUSE_TEST3_ENDPOINTS
	-DFFP_ENABLE_DANGEROUS_ENDPOINTS
	-DOLED_DIAGNOSTIC
	-DCORE_DEBUG_LEVEL=1
	-DLOG_LEVEL=5
	-DENABLE_SENSOR_LOGS=1
	-DENABLE_SERIAL_MONITOR=1
	-USILENT_MODE
	-DUSE_AIR_SENSOR_AUTO
	; Core dump désactivé partout (évite problèmes boot, source de bugs)
	-DFFP5CS_COREDUMP_ENABLE=0
monitor_filters = time

; S3 N16R8 (16 Mo flash + 8 Mo PSRAM) : env dédié PSRAM pour le matériel de référence ; définit BOARD_HAS_PSRAM.
; Pre scripts : patch Arduino (earlyInitVariant pour TG0WDT) + CONFIG_ESP_INT_WDT=0 (qio_opi) pour TG1WDT.
[env:wroom-s3-test-psram]
extends = env:wroom-s3-base
; Liste explicite (évite concaténation comma avec ${env.extra_scripts} → chemin invalide)
; pio_ensure_lib_dirs_windows.py : pré-crée libXXX/Noms avec espaces sous Windows (évite erreur .d)
extra_scripts =
	pre:../scripts/pio_redirect_build_dir.py
	pre:tools/pio_ensure_secrets.py
	pre:tools/pio_add_mklittlefs_path.py
	pre:tools/pio_ensure_lib_dirs_windows.py
	pre:tools/pio_ensure_git_data.py
	pre:tools/s3_patch_esp_insights_mqtt.py
	pre:tools/s3_patch_wpa_supplicant_wno_error.py
	pre:tools/pio_pre_apply_arduino_patches.py
	pre:tools/pio_s3_psram_patch_iwdt.py
	post:tools/pio_write_build_version.py
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_build.flash_mode = qio
board_build.extra_flags = -DBOARD_HAS_PSRAM
board_build.partitions = config/partitions/partitions_esp32_s3_test.csv
board_build.sdkconfig_options =
  CONFIG_ESPTOOLPY_FLASHMODE_QIO=y
  CONFIG_SPIRAM=y
custom_sdkconfig = file://sdkconfig_s3_wdt_16mb_psram.txt
lib_ignore = LittleFS
build_flags =
	${env:wroom-s3-base.build_flags}
	-DBOARD_HAS_PSRAM
	-mfix-esp32-psram-cache-issue
	-DCONFIG_LITTLEFS_PAGE_SIZE=256
	-DPROFILE_TEST
	-DUSE_TEST3_ENDPOINTS
	-DFFP_ENABLE_DANGEROUS_ENDPOINTS
	-DOLED_DIAGNOSTIC
	-DCORE_DEBUG_LEVEL=1
	-DLOG_LEVEL=5
	-DENABLE_SENSOR_LOGS=1
	-DENABLE_SERIAL_MONITOR=1
	-USILENT_MODE
	; Serial sur UART comme wroom-s3-test (même port flash/moniteur)
	-DARDUINO_USB_CDC_ON_BOOT=0
monitor_filters = time

; S3 N16R8 PSRAM v2 : options board alignées "test psram s3" (psram_type, flash_mode, sdkconfig_options), sans patches Arduino/IWDT. Même plateforme que le projet (évite erreur CreateProcess toolchain 6.4.0).
[env:wroom-s3-test-psram-v2]
extends = env:wroom-s3-base
extra_scripts = ${env.extra_scripts}
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_build.flash_mode = qio
board_build.extra_flags = -DBOARD_HAS_PSRAM
board_build.partitions = config/partitions/partitions_esp32_s3_test.csv
board_build.sdkconfig_options =
  CONFIG_ESPTOOLPY_FLASHMODE_QIO=y
  CONFIG_SPIRAM=y
custom_sdkconfig = file://sdkconfig_s3_wdt_16mb_psram.txt
lib_ignore = LittleFS
build_flags =
	${env:wroom-s3-base.build_flags}
	-DBOARD_HAS_PSRAM
	-DCONFIG_LITTLEFS_PAGE_SIZE=256
	-DPROFILE_TEST
	-DUSE_TEST3_ENDPOINTS
	-DFFP_ENABLE_DANGEROUS_ENDPOINTS
	-DOLED_DIAGNOSTIC
	-DCORE_DEBUG_LEVEL=1
	-DLOG_LEVEL=5
	-DENABLE_SENSOR_LOGS=1
	-DENABLE_SERIAL_MONITOR=1
	-USILENT_MODE
monitor_filters = time

; Env pour DevKitC-1 8 Mo flash + PSRAM (qio_opi). Pour le matériel 16 Mo flash + 8 Mo PSRAM (N16R8), utiliser wroom-s3-test-psram.
[env:wroom-s3-test-devkit]
extends = env:wroom-s3-base
platform = platformio/espressif32@6.13.0
board = esp32-s3-devkitc-1
board_upload.flash_size = 8MB
board_build.arduino.memory_type = qio_opi
board_build.partitions = config/partitions/partitions_esp32_s3_8mb.csv
; upload_port : ne pas coder en dur ; utiliser --upload-port COMx ou variable d'env
custom_sdkconfig = file://sdkconfig_s3_wdt_8mb.txt
lib_ignore = LittleFS
build_flags =
	${env:wroom-s3-base.build_flags}
	-DCONFIG_LITTLEFS_PAGE_SIZE=256
	-DPROFILE_TEST
	-DUSE_TEST3_ENDPOINTS
	-DFFP_ENABLE_DANGEROUS_ENDPOINTS
	-DOLED_DIAGNOSTIC
	-DCORE_DEBUG_LEVEL=1
	-DLOG_LEVEL=5
	-DENABLE_SENSOR_LOGS=1
	-DENABLE_SERIAL_MONITOR=1
	-USILENT_MODE
monitor_filters = time

; S3 avec USB Serial/JTAG natif : flash + monitor + debug JTAG via un seul câble USB.
; Carte avec connecteur USB câblé sur GPIO19/20 (ex. ESP32-S3-DevKitC-1).
; Voir docs/technical/ESP32S3_USB_JTAG_DEBUG.md pour l'utilisation.
[env:wroom-s3-test-usb]
extends = env:wroom-s3-test
upload_protocol = esp-builtin
debug_tool = esp-builtin
build_flags =
	${env:wroom-s3-test.build_flags}
	-DARDUINO_USB_CDC_ON_BOOT=1
monitor_filters = time

; S3 prod : même plateforme que wroom-s3-test (platformio/espressif32). Flags PROD uniquement.
[env:wroom-s3-prod]
extends = env:wroom-s3-base
lib_ignore = WebServer, ESPAsyncWebServer, WebSockets, LittleFS
build_flags =
	${env:wroom-s3-base.build_flags}
	-DCONFIG_LITTLEFS_PAGE_SIZE=256
	-DPROFILE_PROD
	-DDISABLE_ASYNC_WEBSERVER
	-DENABLE_SERIAL_MONITOR=0
	-DENABLE_SENSOR_LOGS=0
	-DCORE_DEBUG_LEVEL=0
	-DLOG_LEVEL=0
	-DUSE_AIR_SENSOR_AUTO

; =============================================================================
; ENVIRONNEMENT BETA WROOM (reflet prod, mode test : OTA test, partition, pas de serveur embarqué)
; Entêtes "beta" dans mails, OLED, etc. — pas de LittleFS comme wroom-prod.
; Hérite de wroom-prod la partition sans FS (partitions_esp32_wroom_ota_no_fs.csv).
; =============================================================================
[env:wroom-beta]
extends = env:wroom-prod
; Hérite lib_ignore et board_build.partitions de wroom-prod (pas de serveur embarqué)
; DHT11 (pas DHT22) : annuler USE_DHT22 hérité de wroom-prod
; PROFILE_BETA : entêtes "beta" au lieu de "prod" (mails, OLED, getProfileName)
; Note: avec certains setups PlatformIO, build seul peut échouer (FRAMEWORK_DIR None). Essayer après un build wroom-prod réussi.
build_flags =
	${env:wroom-prod.build_flags}
	-UPROFILE_PROD
	-DPROFILE_BETA
	-UUSE_DHT22
	-DUSE_TEST_ENDPOINTS
	; Moniteur série activé en beta (hérité désactivé de wroom-prod)
	-UENABLE_SERIAL_MONITOR
	-DENABLE_SERIAL_MONITOR=1
	-UCORE_DEBUG_LEVEL
	-DCORE_DEBUG_LEVEL=1
monitor_filters = time

; =============================================================================
; ENVIRONNEMENT TEST TLS MINIMAL
; =============================================================================
[env:wroom-tls-test]
board = esp32dev
board_build.partitions = config/partitions/partitions_esp32_wroom_test.csv
build_flags =
	${env.build_flags}
	-DBOARD_WROOM
	-DPROFILE_TEST
	-DENABLE_SERIAL_MONITOR=1
	-DCORE_DEBUG_LEVEL=5
	-DLOG_LEVEL=5
	-DFFP5CS_COREDUMP_ENABLE=0
build_src_filter =
	-<*>
	+<tls_minimal_test.cpp>
upload_speed = 115200
monitor_filters = time

; Tests natifs Unity : fichier dédié (évite framework Arduino de [env])
;   pio test -c platformio-native.ini -e native
;   .\scripts\test_unit_all.ps1