; ESP32-S3-WROOM-1-N16R8 (16MB Flash QIO, 8MB PSRAM OPI)
; upload_port/monitor_port : ne pas coder en dur ; utiliser --upload-port COMx ou variable d'env
;
; DIVERGENCE VOLONTAIRE : ce projet conserve espressif32@6.4.0 + arduino-esp32 2.0.14
; car le framework 3.x provoque une erreur "missing SConscript" (pioarduino-build.py) avec
; cette config PSRAM OPI. Le projet principal ffp5cs utilise platformio/espressif32@6.13.0.
; Voir DOCUMENTATION.md section 3 et 6.5.

[env:esp32-s3-n16r8]
platform = espressif32@6.4.0
board = esp32-s3-devkitc-1
framework = arduino
platform_packages = framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#2.0.14

monitor_speed = 115200

; Flash 16 Mo
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

; PSRAM OPI (Quad Flash + Octal PSRAM)
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_build.flash_mode = qio
board_build.extra_flags = -DBOARD_HAS_PSRAM

; Stabilité: forcer QIO flash et SPIRAM au niveau SDK
board_build.sdkconfig_options =
  CONFIG_ESPTOOLPY_FLASHMODE_QIO=y
  CONFIG_SPIRAM=y
