; PlatformIO Project Configuration — ESP32-CAM upload vers ffp3/ffp3gallery (deep sleep 600 s)
; Carte : ESP32-CAM AI-Thinker. Envoi JPEG vers /ffp3/ffp3gallery/upload.php.
; Ne pas coder en dur upload_port.

[platformio]
default_envs = esp32cam

[env:esp32cam]
platform = platformio/espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
build_flags = -I.

lib_deps =
	bblanchon/ArduinoJson
	mobizt/ESP Mail Client
