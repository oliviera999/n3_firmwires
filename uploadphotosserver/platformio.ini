; PlatformIO — firmware ESP32-CAM unifié (msp1, n3pp, ffp3)
; Carte : ESP32-CAM AI-Thinker. Envoi JPEG vers galeries iot.olution.info.
; Ne pas coder en dur upload_port / monitor_port.

[platformio]
default_envs = msp1

[env:msp1]
platform = platformio/espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
board_build.partitions = ../config/partitions/min_spiffs.csv
build_flags =
    -I $PROJECT_DIR/include
    -DTARGET_MSP1
lib_extra_dirs = ../shared
lib_deps =
    bblanchon/ArduinoJson
    mobizt/ESP Mail Client
    fbiego/ESP32Time

[env:n3pp]
platform = platformio/espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
board_build.partitions = ../config/partitions/min_spiffs.csv
build_flags =
    -I $PROJECT_DIR/include
    -DTARGET_N3PP
lib_extra_dirs = ../shared
lib_deps =
    bblanchon/ArduinoJson
    mobizt/ESP Mail Client
    fbiego/ESP32Time

[env:ffp3]
platform = platformio/espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
board_build.partitions = ../config/partitions/min_spiffs.csv
build_flags =
    -I $PROJECT_DIR/include
    -DTARGET_FFP3
lib_extra_dirs = ../shared
lib_deps =
    bblanchon/ArduinoJson
    mobizt/ESP Mail Client
    fbiego/ESP32Time
