; PlatformIO — firmware ESP32-CAM unifié (msp1, n3pp, ffp3)
; Matériel cible : module AI Thinker (ESP32-D0WD, flash SPI 4 Mo DIO, PSRAM QSPI, OV2640, SD).
; Pins caméra / LED : include/config.h (indépendantes du nom de carte Arduino).
; Carte PlatformIO = esp32dev (même variant "esp32" que esp32cam) : le profil esp32cam ajoute
; BOARD_HAS_PSRAM et une lib Arduino précompilée qui appelle esp_psram_* — symboles absents de
; libesp_psram.a avec pioarduino / Arduino-ESP32 3.3.x → échec de link. memory_type dio_qspi
; conserve sdkconfig flash DIO + SPIRAM QSPI conforme au module.
; Ne pas coder en dur upload_port / monitor_port.
; Build Windows : sortie sous C:\pio-builds\uploadphotosserver\<env>\ (pio_redirect_build_dir.py).

[platformio]
default_envs = msp1

[env:cam-base]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32dev
framework = arduino
monitor_speed = 115200
; ESP32-CAM + pont USB-série : sans cela, Cursor/VSCode et certains terminaux pilotent RTS/DTR et
; la carte reste en reset ou en téléchargement → moniteur série vide (souvent « rien ne sort »).
monitor_rts = 0
monitor_dtr = 0
board_build.partitions = ../config/partitions/min_spiffs.csv
board_build.arduino.memory_type = dio_qspi
extra_scripts =
	pre:../scripts/pio_redirect_build_dir.py
	pre:tools/pio_ensure_credentials.py
	pre:../scripts/pio_patch_esp_mail_fs_spiffs.py
; Un seul « .. » = racine firmwires (credentials.h, partagé). « ../.. » pointe vers IOT_n3 et faisait
; prendre uploadphotosserver/include/credentials.h (sans SMTP) au lieu de firmwires/credentials.h.
build_flags =
    -I $PROJECT_DIR/..
    -I $PROJECT_DIR/include
    -mfix-esp32-psram-cache-issue
lib_extra_dirs = ../shared
lib_deps =
    bblanchon/ArduinoJson@7.4.3
    fbiego/ESP32Time@2.0.6
    mobizt/ESP Mail Client@3.4.24

[env:msp1]
extends = env:cam-base
build_flags =
    ${env:cam-base.build_flags}
    -DTARGET_MSP1

[env:n3pp]
extends = env:cam-base
build_flags =
    ${env:cam-base.build_flags}
    -DTARGET_N3PP

[env:ffp3]
extends = env:cam-base
build_flags =
    ${env:cam-base.build_flags}
    -DTARGET_FFP3

; ---------- Option 2 : ESP32-CAM + SPIRAM « comme avant » (Arduino 2.x / IDF 4.4) ----------
; Plateforme platformio/espressif32@6.13.0 + board esp32cam : psramFound() et liens esp_psram_*
; cohérents (SXGA typique si PSRAM OK). À utiliser sur carte réelle avec PSRAM pour les photos.
; Les envs msp1 / n3pp / ffp3 restent en pioarduino + esp32dev (alignement WROOM du dépôt).
; Pas de gcc_atomic_compat.c (réservé GCC 14 / pioarduino).

[env:cam-legacy-base]
platform = platformio/espressif32@6.13.0
board = esp32cam
framework = arduino
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
board_build.partitions = ../config/partitions/min_spiffs.csv
extra_scripts =
	pre:../scripts/pio_redirect_build_dir.py
	pre:tools/pio_ensure_credentials.py
	pre:../scripts/pio_patch_esp_mail_fs_spiffs.py
build_flags =
	-I $PROJECT_DIR/..
	-I $PROJECT_DIR/include
	-mfix-esp32-psram-cache-issue
build_src_filter = +<*> -<gcc_atomic_compat.c>
lib_extra_dirs = ../shared
lib_deps =
	bblanchon/ArduinoJson@7.4.3
	fbiego/ESP32Time@2.0.6
	mobizt/ESP Mail Client@3.4.24

[env:msp1-cam]
extends = env:cam-legacy-base
build_flags =
	${env:cam-legacy-base.build_flags}
	-DTARGET_MSP1

[env:n3pp-cam]
extends = env:cam-legacy-base
build_flags =
	${env:cam-legacy-base.build_flags}
	-DTARGET_N3PP

[env:ffp3-cam]
extends = env:cam-legacy-base
build_flags =
	${env:cam-legacy-base.build_flags}
	-DTARGET_FFP3
