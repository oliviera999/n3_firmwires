; Firmware camera unifie — 3 cibles via build flags
; Compiler : pio run -e msp1  /  pio run -e n3pp  /  pio run -e ffp3

[platformio]
default_envs = msp1

[env]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
lib_extra_dirs = ../shared
build_flags = -I../

lib_deps =
    bblanchon/ArduinoJson

[env:msp1]
build_flags =
    ${env.build_flags}
    -DTARGET_MSP1

[env:n3pp]
build_flags =
    ${env.build_flags}
    -DTARGET_N3PP

[env:ffp3]
build_flags =
    ${env.build_flags}
    -DTARGET_FFP3
