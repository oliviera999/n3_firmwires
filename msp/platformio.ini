; PlatformIO Project Configuration — MeteoStationPrototype (MSP1)
; Carte : ESP32 (esp32dev). Station meteo + tracker solaire.
; Build Windows : sortie sous C:\pio-builds\msp\<env>\ (firmwires/scripts/pio_redirect_build_dir.py).

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = ../config/partitions/min_spiffs.csv
lib_extra_dirs = ../shared
build_flags =
	-I../
	-include "soc/gpio_struct.h"
	-DCONFIG_ESP_TASK_WDT_TIMEOUT_S=30
extra_scripts =
	pre:../scripts/pio_redirect_build_dir.py
	pre:../scripts/pio_patch_esp_mail_fs_spiffs.py
	pre:scripts/upload_hook_otadata.py

lib_deps =
	bblanchon/ArduinoJson@7.4.3
	ESP32Async/AsyncTCP@3.4.10
	ESP32Async/ESPAsyncWebServer@3.10.0
	adafruit/Adafruit Unified Sensor@1.1.15
	adafruit/DHT sensor library@1.4.7
	adafruit/Adafruit GFX Library@1.12.5
	adafruit/Adafruit SSD1306@2.5.16
	adafruit/Adafruit BusIO@1.17.4
	paulstoffregen/OneWire@2.3.8
	milesburton/DallasTemperature@4.0.5
	madhephaestus/ESP32Servo@3.1.3
	fbiego/ESP32Time@2.0.6
	arduino-libraries/Arduino_JSON@0.2.0
	mobizt/ESP Mail Client@3.4.24

lib_ignore = WebServer

[env:esp32dev_test]
extends = env:esp32dev
build_flags =
	-I../
	-include "soc/gpio_struct.h"
	-DTEST_MODE
	-DCONFIG_ESP_TASK_WDT_TIMEOUT_S=30
