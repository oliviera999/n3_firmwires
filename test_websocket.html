<!DOCTYPE html>
<html>
<head>
    <title>Test WebSocket ESP32</title>
</head>
<body>
    <h1>Test WebSocket ESP32</h1>
    <div id="status">En attente...</div>
    <div id="messages"></div>
    <button onclick="testWebSocket()">Tester WebSocket</button>
    
    <script>
        function addMessage(msg) {
            const div = document.getElementById('messages');
            div.innerHTML += '<div>' + new Date().toLocaleTimeString() + ': ' + msg + '</div>';
        }
        
        function testWebSocket() {
            const status = document.getElementById('status');
            status.textContent = 'Test en cours...';
            document.getElementById('messages').innerHTML = '';
            
            const wsUrl = 'ws://192.168.0.86:81/ws';
            addMessage('Tentative de connexion: ' + wsUrl);
            
            const ws = new WebSocket(wsUrl);
            
            ws.onopen = function() {
                status.textContent = 'Connecté !';
                addMessage('✅ WebSocket connecté');
                
                // Envoyer un message de subscription
                const subscribeMsg = JSON.stringify({type: 'subscribe'});
                addMessage('Envoi: ' + subscribeMsg);
                ws.send(subscribeMsg);
                
                // Envoyer un ping
                const pingMsg = JSON.stringify({type: 'ping'});
                addMessage('Envoi ping: ' + pingMsg);
                ws.send(pingMsg);
            };
            
            ws.onclose = function(event) {
                status.textContent = 'Déconnecté';
                addMessage('❌ WebSocket fermé - Code: ' + event.code + ', Raison: ' + event.reason);
            };
            
            ws.onerror = function(error) {
                status.textContent = 'Erreur';
                addMessage('❌ Erreur WebSocket: ' + error);
            };
            
            ws.onmessage = function(event) {
                addMessage('📨 Message reçu: ' + event.data);
                try {
                    const msg = JSON.parse(event.data);
                    addMessage('📋 Message parsé: ' + JSON.stringify(msg, null, 2));
                } catch (e) {
                    addMessage('❌ Erreur parsing: ' + e.message);
                }
            };
        }
    </script>
</body>
</html>
