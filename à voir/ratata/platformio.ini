; PlatformIO Project Configuration — Ratata (Kit ZYC0108-EN)
; 7 environnements Arduino UNO + 1 ESP32-CAM. Voiture robot, démo locale.
; Ne pas coder en dur upload_port (variable d'environnement ou override local).

[platformio]
default_envs = 1_auto_move

; ——— Environnements Arduino UNO (exemples 1 à 5, 6.2, test) ———
[env:1_auto_move]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 9600
build_src_filter = "+<1_Auto_move/>"

[env:2_servo_angle]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 9600
build_src_filter = "+<2_servo_Angle/>"

[env:3_ultrasonic_follow]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 9600
build_src_filter = "+<3_Ultrasonic_follow/>"

[env:4_obstacle_avoidance]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 9600
build_src_filter = "+<4_Obstacle_Avoidance/>"

[env:5_tracking]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 9600
build_src_filter = "+<5_Tracking/>"

[env:6_2_arduino_uno]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 9600
build_src_filter = "+<6.2_Arduino_UNO/>"

[env:test]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 9600
build_src_filter = "+<test/>"

; ——— Environnement ESP32-CAM (exemple 6.1) ———
[env:6_1_esp32_car]
platform = platformio/espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
build_src_filter = "+<6.1_ESP32_Car/>"
