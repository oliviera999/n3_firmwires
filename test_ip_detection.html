<!DOCTYPE html>
<html>
<head>
    <title>Test Détection IP ESP32</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; border: 1px solid #bee5eb; }
    </style>
</head>
<body>
    <h1>Test de Détection IP ESP32</h1>
    <button onclick="testDetection()">Tester la Détection IP</button>
    <div id="results"></div>

    <script>
        async function detectNewESP32IP() {
            return new Promise((resolve, reject) => {
                // Méthode 1: Essayer mDNS (.local)
                const mdnsCheck = fetch('http://esp32.local/json', { 
                    method: 'HEAD',
                    cache: 'no-store',
                    signal: AbortSignal.timeout(2000)
                }).then(() => {
                    console.log('🔍 ESP32 détecté via mDNS: esp32.local');
                    return 'esp32.local';
                }).catch(() => null);
                
                // Méthode 2: Scanner les IPs communes du réseau local
                const commonIPs = [];
                const currentIP = window.location.hostname || '192.168.1.100'; // IP par défaut
                const baseIP = currentIP.substring(0, currentIP.lastIndexOf('.'));
                
                // Générer des IPs à scanner (généralement .1 à .20)
                for (let i = 1; i <= 20; i++) {
                    commonIPs.push(`${baseIP}.${i}`);
                }
                
                const ipScanPromises = commonIPs.map(ip => 
                    fetch(`http://${ip}/json`, { 
                        method: 'HEAD',
                        cache: 'no-store',
                        signal: AbortSignal.timeout(1000)
                    }).then(() => ip).catch(() => null)
                );
                
                // Essayer d'abord mDNS, puis le scan IP
                Promise.race([
                    mdnsCheck,
                    Promise.race(ipScanPromises.filter(p => p !== null))
                ]).then(result => {
                    if (result) {
                        resolve(result);
                    } else {
                        reject(new Error('Aucune IP trouvée'));
                    }
                }).catch(reject);
            });
        }

        function addResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.innerHTML = message;
            document.getElementById('results').appendChild(div);
        }

        async function testDetection() {
            document.getElementById('results').innerHTML = '';
            addResult('🔍 Début du test de détection IP...', 'info');
            
            try {
                const startTime = Date.now();
                const ip = await detectNewESP32IP();
                const duration = Date.now() - startTime;
                
                addResult(`✅ ESP32 détecté à l'IP: <strong>${ip}</strong> (${duration}ms)`, 'success');
                
                // Tester la connectivité WebSocket
                addResult('🔌 Test de connectivité WebSocket...', 'info');
                const ws = new WebSocket(`ws://${ip}:81/ws`);
                
                ws.onopen = () => {
                    addResult(`✅ WebSocket connecté sur ${ip}:81`, 'success');
                    ws.close();
                };
                
                ws.onerror = (error) => {
                    addResult(`❌ Erreur WebSocket sur ${ip}:81`, 'error');
                };
                
                ws.onclose = () => {
                    addResult('🔌 WebSocket fermé', 'info');
                };
                
            } catch (error) {
                addResult(`❌ Erreur: ${error.message}`, 'error');
            }
        }
    </script>
</body>
</html>
